# Cargo configuration for Aura workspace
#
# Cargo automatically uses the workspace root's target directory when running
# from any subdirectory within the workspace. No explicit configuration needed.
#
# IMPORTANT: Do not set CARGO_TARGET_DIR in the environment, as a relative
# value will resolve incorrectly when running from subdirectories.
#
# External tools (like dx/dioxus-cli) that invoke cargo may not respect
# workspace resolution. Those tools should explicitly set CARGO_TARGET_DIR
# to an absolute path (see scripts/web/dx.sh).
