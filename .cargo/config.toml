# Cargo configuration for Aura workspace
#
# This ensures all crates use the shared target directory at the workspace root,
# even when running cargo commands from within individual crate directories.

[build]
# Use the workspace root's target directory for all builds
target-dir = "target"

[env]
# Ensure CARGO_TARGET_DIR is set for any subprocess that might run cargo
CARGO_TARGET_DIR = { value = "target", relative = true }
