[package]
name = "aura-relational"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "RelationalContext implementation for cross-authority coordination in Aura"
keywords = ["aura", "relational", "authority", "coordination", "crdt"]
categories = ["cryptography", "data-structures"]

[dependencies]
aura-core = { path = "../aura-core", version = "0.1.0" }
aura-journal = { path = "../aura-journal", version = "0.1.0" }
aura-macros = { path = "../aura-macros", version = "0.1.0" }
aura-consensus = { path = "../aura-consensus", version = "0.1.0" }
aura-effects = { path = "../aura-effects", version = "0.1.0" }

async-trait = { workspace = true }
bincode = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }

[dev-dependencies]
tokio = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { workspace = true }

[features]
default = []
