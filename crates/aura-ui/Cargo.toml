[package]
name = "aura-ui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Shared Dioxus UI core for Aura frontends"
publish = false

[lints]
workspace = true

[features]
default = []

[dependencies]
aura-app = { path = "../aura-app", version = "0.1.0", features = ["signals"] }
aura-core = { path = "../aura-core", version = "0.1.0" }
async-lock = { workspace = true }
async-trait = { workspace = true }
cfg-if = "1"
dioxus = { version = "0.7", default-features = false, features = ["macro", "hooks", "signals", "html"] }
dioxus-shadcn = { git = "https://github.com/hxrts/dioxus-shadcn.git", rev = "ee0ac75d68cf351b3fddc182d74f131c8337c585" }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[build-dependencies]
toml = "0.8"
