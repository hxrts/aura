[package]
name = "aura-ui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Shared Dioxus UI core for Aura frontends"

[lints]
workspace = true

[features]
default = []

[dependencies]
aura-app = { path = "../aura-app" }
async-lock = { workspace = true }
cfg-if = "1"
dioxus = { version = "0.7", default-features = false, features = ["macro", "hooks", "signals", "html"] }
dioxus-shadcn = { git = "https://github.com/hxrts/dioxus-shadcn.git", rev = "768507cef1d1faf47370a7e11d6dbdabd682a420" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }

[build-dependencies]
toml = "0.8"
