[package]
name = "aura-macros"
version = "0.1.0"
edition = "2021"

[lib]
proc-macro = true

[features]
default = ["proc-macro"]
proc-macro = []

[dependencies]
proc-macro2 = { version = "1.0", features = ["span-locations"] }
quote = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits", "visit"] }
telltale = { workspace = true }
telltale-choreography = { workspace = true }
telltale-theory = { workspace = true }
futures = "0.3"
thiserror = "1.0"
serde_json = { workspace = true }

# Async trait support for generated code  
async-trait = "0.1"

# Aura crate dependencies for Biscuit integration (minimal to avoid cycles)
aura-core = { path = "../aura-core", version = "0.1.0" }
aura-mpst = { path = "../aura-mpst", version = "0.1.0" }

[dev-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
aura-core = { path = "../aura-core" }
trybuild = "1.0"
