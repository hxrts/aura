[package]
name = "hxrts-aura-rendezvous"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Secret-Branded Broadcasting (SBB) and rendezvous protocols for Aura"
include = ["src/**", "Cargo.toml"]

[lib]
name = "aura_rendezvous"
[dependencies]
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.2.0" }
aura-macros = { package = "hxrts-aura-macros", path = "../aura-macros", version = "=0.2.0" }
aura-journal = { package = "hxrts-aura-journal", path = "../aura-journal", version = "=0.2.0" }
aura-guards = { package = "hxrts-aura-guards", path = "../aura-guards", version = "=0.2.0" }
aura-social = { package = "hxrts-aura-social", path = "../aura-social", version = "=0.2.0" }
aura-mpst = { package = "hxrts-aura-mpst", path = "../aura-mpst", version = "=0.2.0" }
aura-transport = { package = "hxrts-aura-transport", path = "../aura-transport", version = "=0.2.0" }

async-lock = "3"
async-trait = { workspace = true }
base64 = { workspace = true }
bincode = { workspace = true }
biscuit-auth = { workspace = true }
curve25519-dalek = { workspace = true }
ed25519-dalek = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
indexmap = { workspace = true }
rand_core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
telltale = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
aura-effects = { package = "hxrts-aura-effects", version = "=0.2.0", path = "../aura-effects" }
proptest = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true }

[features]
default = []
