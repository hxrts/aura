[package]
name = "aura-quint"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Core Quint formal verification integration for Aura - Layer 3: Implementation"
publish = false

[dependencies]
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.1.0", features = ["simulation"] }
aura-effects = { package = "hxrts-aura-effects", path = "../aura-effects", version = "=0.1.0", features = ["simulation"] }

serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
futures-timer = { version = "3", features = ["wasm-bindgen"] }
uuid = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
tracing = { workspace = true }
async-trait = { workspace = true }
async-process = "1"
tempfile = "3.0"
telltale-bridge = { workspace = true }
quint_evaluator = { git = "https://github.com/informalsystems/quint", tag = "v0.29.0" }

[dev-dependencies]
tokio = { workspace = true }

[lib]
crate-type = ["rlib"]
