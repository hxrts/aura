[package]
name = "aura-quint"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Core Quint formal verification integration for Aura - Layer 3: Implementation"
publish = false

[dependencies]
# Core dependencies
aura-core = { path = "../aura-core", version = "0.1.0", features = ["simulation"] }
aura-effects = { path = "../aura-effects", version = "0.1.0", features = ["simulation"] }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
futures-timer = { version = "3", features = ["wasm-bindgen"] }
uuid = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
tracing = { workspace = true }
async-trait = { workspace = true }
async-process = "1"
tempfile = "3.0"
telltale-lean-bridge = { workspace = true }

# Session types integration - temporarily removed during refactor

# Native Quint evaluator from official repository
quint_evaluator = { git = "https://github.com/informalsystems/quint", tag = "v0.29.0" }

# For development and testing
[dev-dependencies]
tokio = { workspace = true }

# Logging and tracing (for tests)

# Aura types for error handling

[lib]
crate-type = ["rlib"]
