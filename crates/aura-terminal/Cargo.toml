[package]
name = "aura-terminal"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Terminal interface for Aura"
publish = false

[lints]
workspace = true

[lib]
required-features = ["terminal"]

[[bin]]
name = "aura"
path = "src/main.rs"
required-features = ["terminal"]

[[test]]
name = "demo_peer_count"
path = "tests/demo/demo_peer_count.rs"
required-features = ["development"]

[[test]]
name = "demo_amp_channel_echo"
path = "tests/demo/demo_amp_channel_echo.rs"
required-features = ["development"]

[[test]]
name = "e2e_terminal_state"
required-features = ["testing"]

[features]
default = ["terminal"]
terminal = []
testing = ["terminal", "aura-app/app-internals"]
development = [
    "terminal",
    "testing",
    "aura-app/debug-serialize",
    "aura-app/instrumented",
    "dep:aura-simulator",
    "dep:aura-testkit",
    "aura-app/app-internals",
]
proptest = []

[dependencies]
aura-app = { package = "hxrts-aura-app", path = "../aura-app", version = "=0.2.0", features = ["native"] }
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.2.0" }
aura-agent = { package = "hxrts-aura-agent", path = "../aura-agent", version = "=0.2.0" }
aura-protocol = { package = "hxrts-aura-protocol", path = "../aura-protocol", version = "=0.2.0" }
aura-recovery = { package = "hxrts-aura-recovery", path = "../aura-recovery", version = "=0.2.0" }
aura-invitation = { package = "hxrts-aura-invitation", path = "../aura-invitation", version = "=0.2.0" }
aura-authentication = { package = "hxrts-aura-authentication", path = "../aura-authentication", version = "=0.2.0" }
aura-sync = { package = "hxrts-aura-sync", path = "../aura-sync", version = "=0.2.0" }
aura-effects = { package = "hxrts-aura-effects", path = "../aura-effects", version = "=0.2.0" }
aura-authorization = { package = "hxrts-aura-authorization", path = "../aura-authorization", version = "=0.2.0" }
aura-maintenance = { package = "hxrts-aura-maintenance", path = "../aura-maintenance", version = "=0.2.0" }
aura-chat = { package = "hxrts-aura-chat", path = "../aura-chat", version = "=0.2.0" }
aura-journal = { package = "hxrts-aura-journal", path = "../aura-journal", version = "=0.2.0" }
aura-relational = { package = "hxrts-aura-relational", path = "../aura-relational", version = "=0.2.0" }
aura-macros = { package = "hxrts-aura-macros", path = "../aura-macros", version = "=0.2.0" }

aura-simulator = { path = "../aura-simulator", optional = true }
aura-testkit = { path = "../aura-testkit", optional = true, features = ["full-effect-system"] }

async-trait = { workspace = true }
iocraft = "0.7.16"
futures-signals = "0.3"
toml = { workspace = true }
serde = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
cfg-if = "1"
bpaf = "0.9"
tokio = { workspace = true, features = ["fs", "signal", "rt-multi-thread"] }
async-lock = "3"
futures = { workspace = true }
parking_lot = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json = { workspace = true }
serde_cbor = { workspace = true }
uuid = { workspace = true }
once_cell = { workspace = true }
biscuit-auth = { workspace = true }
nix = "0.26"
dirs = "6"
arboard = "3"

[dev-dependencies]
aura-testkit = { path = "../aura-testkit", features = ["full-effect-system"] }
tempfile = { workspace = true }
insta = "1.34"
proptest = { workspace = true }
assert_matches = { workspace = true }
trybuild = { workspace = true }
