[package]
name = "hxrts-aura-social"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Social topology (blocks and neighborhoods) for the Aura threshold identity platform"
keywords = ["social", "topology", "blocks", "neighborhoods", "relay"]
categories = ["cryptography"]

[lib]
name = "aura_social"
[dependencies]
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.2.0" }
aura-journal = { package = "hxrts-aura-journal", path = "../aura-journal", version = "=0.2.0" }
aura-macros = { package = "hxrts-aura-macros", path = "../aura-macros", version = "=0.2.0" }

async-trait = { workspace = true }
bincode = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
async-trait = { workspace = true }
proptest = { workspace = true }

[features]
default = []
transparent_onion = ["aura-core/transparent_onion"]

[lints]
workspace = true
