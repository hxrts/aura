[package]
name = "aura-sync"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Journal synchronization and peer-to-peer fact exchange"
include = ["src/**", "Cargo.toml"]

[features]
default = []
# Choreography-based CRDT sync via CrdtCoordinator
crdt-sync = ["aura-protocol/crdt-sync"]

[dependencies]
aura-core = { path = "../aura-core", version = "0.1.0" }
aura-protocol = { path = "../aura-protocol", version = "0.1.0" }
aura-guards = { path = "../aura-guards", version = "0.1.0" }
aura-journal = { path = "../aura-journal", version = "0.1.0" }
aura-authorization = { path = "../aura-authorization", version = "0.1.0" }
aura-maintenance = { path = "../aura-maintenance", version = "0.1.0" }
aura-rendezvous = { path = "../aura-rendezvous", version = "0.1.0" }
aura-effects = { path = "../aura-effects", version = "0.1.0" }
aura-anti-entropy = { path = "../aura-anti-entropy", version = "0.1.0" }
aura-macros = { path = "../aura-macros", version = "0.1.0" }
aura-mpst = { path = "../aura-mpst", version = "0.1.0" }

async-lock = "3"
async-trait = { workspace = true }
bincode = { workspace = true }
biscuit-auth = { workspace = true }
futures = { workspace = true }
hex = "0.4"
parking_lot = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
telltale = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
aura-macros = { path = "../aura-macros" }
aura-testkit = { path = "../aura-testkit" }
tokio = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"

[lints]
workspace = true
