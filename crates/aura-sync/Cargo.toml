[package]
name = "aura-sync"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Journal synchronization and peer-to-peer fact exchange"
include = ["src/**", "Cargo.toml"]

[features]
default = []
# Enable choreography-based CRDT synchronization via CrdtCoordinator.
# Use this for general CRDT state sync (journal facts, app state) as an
# alternative to digest-based anti-entropy sync.
crdt-sync = ["aura-protocol/crdt-sync"]

[dependencies]
aura-core = { path = "../aura-core", version = "0.1.0" }
aura-protocol = { path = "../aura-protocol", version = "0.1.0" }
aura-guards = { path = "../aura-guards", version = "0.1.0" }
aura-journal = { path = "../aura-journal", version = "0.1.0" }
aura-authorization = { path = "../aura-authorization", version = "0.1.0" }
aura-maintenance = { path = "../aura-maintenance", version = "0.1.0" }
aura-rendezvous = { path = "../aura-rendezvous", version = "0.1.0" }
aura-effects = { path = "../aura-effects", version = "0.1.0" }
aura-anti-entropy = { path = "../aura-anti-entropy", version = "0.1.0" }
aura-macros = { path = "../aura-macros", version = "0.1.0" }
aura-mpst = { path = "../aura-mpst", version = "0.1.0" }
telltale = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
async-lock = "3"
bincode = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
biscuit-auth = { workspace = true }
hex = "0.4"

[dev-dependencies]
# Testing infrastructure (Layer 5 can use testkit)
aura-testkit = { path = "../aura-testkit" }
aura-macros = { path = "../aura-macros" }
tokio = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"



[lints]
workspace = true
