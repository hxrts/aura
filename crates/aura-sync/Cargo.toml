[package]
name = "hxrts-aura-sync"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Journal synchronization and peer-to-peer fact exchange"
include = ["src/**", "Cargo.toml"]

[lib]
name = "aura_sync"
[features]
default = []
# Choreography-based CRDT sync via CrdtCoordinator
crdt-sync = ["aura-protocol/crdt-sync"]
transparent_onion = [
    "aura-core/transparent_onion",
    "aura-effects/transparent_onion",
    "aura-protocol/transparent_onion",
]

[dependencies]
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.2.0" }
aura-protocol = { package = "hxrts-aura-protocol", path = "../aura-protocol", version = "=0.2.0" }
aura-guards = { package = "hxrts-aura-guards", path = "../aura-guards", version = "=0.2.0" }
aura-journal = { package = "hxrts-aura-journal", path = "../aura-journal", version = "=0.2.0" }
aura-authorization = { package = "hxrts-aura-authorization", path = "../aura-authorization", version = "=0.2.0" }
aura-maintenance = { package = "hxrts-aura-maintenance", path = "../aura-maintenance", version = "=0.2.0" }
aura-rendezvous = { package = "hxrts-aura-rendezvous", path = "../aura-rendezvous", version = "=0.2.0" }
aura-signature = { package = "hxrts-aura-signature", path = "../aura-signature", version = "=0.2.0" }
aura-effects = { package = "hxrts-aura-effects", path = "../aura-effects", version = "=0.2.0" }
aura-anti-entropy = { package = "hxrts-aura-anti-entropy", path = "../aura-anti-entropy", version = "=0.2.0" }
aura-macros = { package = "hxrts-aura-macros", path = "../aura-macros", version = "=0.2.0" }
aura-mpst = { package = "hxrts-aura-mpst", path = "../aura-mpst", version = "=0.2.0" }

async-lock = "3"
async-trait = { workspace = true }
bincode = { workspace = true }
biscuit-auth = { workspace = true }
futures = { workspace = true }
hex = "0.4"
parking_lot = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
telltale = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
curve25519-dalek = { workspace = true }

[dev-dependencies]
aura-testkit = { package = "aura-testkit", path = "../aura-testkit" }
aura-macros = { package = "hxrts-aura-macros", version = "=0.2.0", path = "../aura-macros" }
tokio = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"

[lints]
workspace = true
