[application]
name = "aura-web"
default_platform = "web"
out_dir = "dist"
asset_dir = "public"
hot_reload = true

[web.app]

[web.watcher]
index_on_404 = true
watch_path = ["src", "../aura-ui/src", "styles", "public"]

[web.resource]
style = ["./assets/tailwind.css"]
script = []

[web.resource.dev]
script = []

[web.wasm_opt]
level = "0"
