[package]
name = "aura-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Webapp for Aura built with Dioxus 0.7"
publish = false

[lints]
workspace = true

[features]
default = []
web = ["dioxus/web"]
harness = []

[dependencies]
aura-app = { package = "hxrts-aura-app", path = "../aura-app", version = "=0.2.0", features = ["web-js"] }
aura-agent = { package = "hxrts-aura-agent", path = "../aura-agent", version = "=0.2.0", features = ["web"] }
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.2.0" }
aura-effects = { package = "hxrts-aura-effects", path = "../aura-effects", version = "=0.2.0" }
aura-ui = { path = "../aura-ui" }

async-lock = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
cfg-if = "1"
dioxus = { workspace = true, features = ["launch", "macro", "hooks", "signals", "html"] }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-net = { version = "0.6", features = ["http"] }
js-sys = { workspace = true }
serde-wasm-bindgen = "0.6"
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
tracing-wasm = "0.2"
web-sys = { workspace = true, features = ["Window", "Document", "Element", "HtmlElement", "HtmlTextAreaElement", "Navigator", "Clipboard", "Storage", "Location", "console", "AbortController", "AbortSignal", "RequestInit", "Response"] }
