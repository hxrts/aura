[package]
name = "aura-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Browser frontend for Aura using Dioxus 0.7"

[lints]
workspace = true

[features]
default = []
web = ["dioxus/web"]

[dependencies]
aura-app = { path = "../aura-app", features = ["web-js"] }
aura-agent = { path = "../aura-agent", features = ["web"] }
aura-core = { path = "../aura-core" }
aura-effects = { path = "../aura-effects" }
aura-ui = { path = "../aura-ui" }
async-lock = { workspace = true }
async-trait = { workspace = true }
cfg-if = "1"
dioxus = { version = "0.7", default-features = false, features = ["launch", "macro", "hooks", "signals", "html"] }
futures = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
tracing-wasm = "0.2"
web-sys = { version = "0.3", features = ["Window", "Navigator", "Clipboard", "Storage", "Location", "console"] }
