[package]
name = "aura-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Browser frontend for Aura using Dioxus 0.7"

[lints]
workspace = true

[dependencies]
aura-app = { path = "../aura-app", features = ["web-js"] }
aura-agent = { path = "../aura-agent", features = ["web"] }
aura-ui = { path = "../aura-ui" }
async-lock = { workspace = true }
cfg-if = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { version = "0.7", default-features = false, features = ["launch", "macro", "hooks", "signals", "html", "web"] }
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Navigator", "Clipboard", "console"] }
