[package]
name = "aura-testkit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
publish = false
autoexamples = false

[lints]
workspace = true

[features]
default = []
full-effect-system = ["dep:aura-agent"]
lean = []
crdt-sync = ["aura-protocol/crdt-sync"]

[dependencies]
aura-core = { path = "../aura-core", version = "0.1.0", features = ["simulation"] }
aura-effects = { path = "../aura-effects", version = "0.1.0", features = ["simulation"] }
aura-mpst = { path = "../aura-mpst", version = "0.1.0" }
aura-journal = { path = "../aura-journal", version = "0.1.0" }
aura-relational = { path = "../aura-relational", version = "0.1.0" }
aura-social = { path = "../aura-social", version = "0.1.0" }
aura-transport = { path = "../aura-transport", version = "0.1.0" }
aura-authorization = { path = "../aura-authorization", version = "0.1.0" }
aura-consensus = { path = "../aura-consensus", version = "0.1.0" }
aura-anti-entropy = { path = "../aura-anti-entropy", version = "0.1.0" }
aura-amp = { path = "../aura-amp", version = "0.1.0" }
aura-protocol = { path = "../aura-protocol", version = "0.1.0" }
aura-app = { path = "../aura-app", version = "0.1.0" }
aura-agent = { path = "../aura-agent", version = "0.1.0", optional = true }
telltale-theory = { workspace = true, features = ["async-subtyping"] }
telltale-theory-v9 = { package = "telltale-theory", version = "9.0.0", features = ["async-subtyping"] }

async-trait = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
futures-timer = { version = "3", features = ["wasm-bindgen"] }
async-lock = "3"
async-channel = "1"

ed25519-dalek = { workspace = true }
frost-ed25519 = { workspace = true }
sha2 = { workspace = true }

rand = { workspace = true }
rand_chacha = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }

uuid = { workspace = true }
once_cell = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_cbor = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
subtle = { workspace = true }
zeroize = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }

proptest = { workspace = true }
biscuit-auth = { workspace = true }
serial_test = { workspace = true }
cfg-if = "1"

[dev-dependencies]
aura-composition = { path = "../aura-composition" }
aura-macros = { path = "../aura-macros", version = "0.1.0" }
bincode = { workspace = true }
tempfile = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio", "html_reports"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
telltale-vm = { workspace = true }

[[bench]]
name = "context_propagation"
harness = false

[[bench]]
name = "effect_system"
harness = false

[[bench]]
name = "handler_performance"
harness = false
