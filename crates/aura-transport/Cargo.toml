[package]
name = "hxrts-aura-transport"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Privacy-aware transport data types and protocol definitions (Layer 2)"
keywords = ["transport", "privacy", "networking", "protocols"]
categories = ["network-programming"]

[lib]
name = "aura_transport"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aura-core = { package = "hxrts-aura-core", path = "../aura-core", version = "=0.2.0" }
aura-macros = { package = "hxrts-aura-macros", path = "../aura-macros", version = "=0.2.0" }

serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]

[[bench]]
name = "transport"
harness = false

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }
