name: CI / Scheduled Quint
run-name: ci/scheduled-quint/${{ github.event_name }}

on:
  schedule:
    # Run once daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  quint-typecheck:
    name: Quint Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: quint-typecheck
      - run: nix develop --command just ci-quint-typecheck
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: quint
          replay-command: nix develop --command just ci-quint-typecheck

  quint-verify:
    name: Quint Verification
    needs: quint-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: quint-verify
      - run: nix develop --command just ci-quint-verify
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: quint
          replay-command: nix develop --command just ci-quint-verify
