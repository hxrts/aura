name: CI / Deep Verify
run-name: ci/deep-verify/${{ github.event_name }}

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  AURA_SUPPRESS_NIX_WELCOME: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lean:
    name: Lean Proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: lean
          enable-store-cache: false
      - name: Build proofs
        run: nix develop --command just ci-lean-build
      - name: Check for incomplete proofs
        run: nix develop --command just ci-lean-check-sorry
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: verify-deep
          replay-command: nix develop --command 'just ci-lean-build && just ci-lean-check-sorry'

  lean-quint-bridge:
    name: Lean-Quint Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: lean-quint-bridge
          enable-store-cache: false
      - name: Bridge cross-validation
        run: nix develop --command just ci-lean-quint-bridge
      - name: Upload bridge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-quint-bridge-${{ github.run_id }}
          path: artifacts/lean-quint-bridge
          if-no-files-found: warn
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: verify-deep
          replay-command: nix develop --command just ci-lean-quint-bridge

  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Run Kani proofs
        uses: model-checking/kani-github-action@v1
        with:
          args: --package aura-protocol --default-unwind 10 --output-format terse
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: verify-deep
          replay-command: cargo install --locked kani-verifier && cargo kani setup && cargo kani --package aura-protocol --default-unwind 10 --output-format terse
