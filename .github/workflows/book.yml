name: Build and Deploy Book

on:
  push:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 1: Link checks
  # ─────────────────────────────────────────────────────────────────────────────

  doc-links:
    name: Doc Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/config/markdown-link-check.json"
          base-branch: "main"
          folder-path: "docs"

  crates-doc-links:
    name: Crates Doc Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: crates-doc-links
      - run: nix develop --command just ci-crates-doc-links

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 2: Build and deploy (after link checks pass)
  # ─────────────────────────────────────────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [doc-links, crates-doc-links]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: book
      - name: Build documentation
        run: nix develop --command just book
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
