name: CI / Deep Harness
run-name: ci/deep-harness/${{ github.event_name }}

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  schedule:
    - cron: "0 7 * * *"

env:
  CARGO_TERM_COLOR: always
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  build:
    name: Harness Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-build
      - run: nix develop --command just ci-harness-build
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-build

  contract:
    name: Harness Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-contract
      - run: nix develop --command just ci-harness-contract
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-contract

  ui-state-evented:
    name: Harness UI Evented
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-ui-state-evented
      - run: nix develop --command just ci-harness-ui-state-evented
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-ui-state-evented

  matrix-inventory:
    name: Harness Matrix Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-matrix-inventory
      - run: nix develop --command just ci-harness-matrix-inventory
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-matrix-inventory

  shared-intent:
    name: Harness Shared Intent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-shared-intent
      - run: nix develop --command just ci-harness-shared-intent-contract
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-shared-intent-contract

  replay:
    name: Harness Replay
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-replay
      - run: nix develop --command just ci-harness-replay
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-replay

  browser:
    name: Harness Browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-browser
      - run: nix develop .#ci --command just ci-harness-browser
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: "1"
      - name: Upload browser harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-browser-${{ github.run_id }}
          path: artifacts/harness/browser
          if-no-files-found: warn
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop .#ci --command just ci-harness-browser

  matrix-tui:
    name: Harness Matrix TUI
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-matrix-tui
      - run: nix develop --command just ci-harness-matrix-tui
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop --command just ci-harness-matrix-tui

  matrix-web:
    name: Harness Matrix Web
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-matrix-web
      - run: nix develop .#ci --command just ci-harness-matrix-web
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: "1"
      - name: Upload browser harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-matrix-web-${{ github.run_id }}
          path: artifacts/harness/browser
          if-no-files-found: warn
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: harness-deep
          replay-command: nix develop .#ci --command just ci-harness-matrix-web
