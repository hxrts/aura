name: Harness

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"

env:
  CARGO_TERM_COLOR: always
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-build
      - run: nix develop --command just ci-harness-build

  contract:
    name: Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-contract
      - run: nix develop --command just ci-harness-contract

  replay:
    name: Replay
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-replay
      - run: nix develop --command just ci-harness-replay

  browser:
    name: Browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-browser
      # Nix-provided ldd can mis-detect Ubuntu host libs for Playwright browsers in CI.
      - run: nix develop --command just ci-harness-browser
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: "1"
      - name: Upload browser harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-browser-${{ github.run_id }}
          path: artifacts/harness/browser
          if-no-files-found: warn
