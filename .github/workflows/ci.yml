name: CI / Fast
run-name: ci/fast/${{ github.ref_name }}

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: format
      - run: nix develop --command just ci-format
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command just ci-format

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: clippy
      - run: nix develop --command just ci-clippy
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command just ci-clippy

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: build
      - run: nix develop --command just ci-build
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command just ci-build

  arch:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: arch
      - run: nix develop --command scripts/check/arch.sh --quick
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command scripts/check/arch.sh --quick

  user-flow-coverage:
    name: User Flow Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: user-flow-coverage
      - run: nix develop --command just ci-user-flow-coverage
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command just ci-user-flow-coverage

  user-flow-policy:
    name: User Flow Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: user-flow-policy
      - run: nix develop --command just ci-user-flow-policy
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command just ci-user-flow-policy

  shared-flow-policy:
    name: Shared Flow Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: shared-flow-policy
      - run: nix develop --command just ci-shared-flow-policy
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command just ci-shared-flow-policy

  test:
    name: Tests + Protocol Compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: test
      - name: Create swap space
        run: |
          if [ -f /swapfile ]; then
            if swapon --show | grep -q /swapfile; then
              echo "Swap already enabled"
            else
              sudo rm -f /swapfile
              sudo fallocate -l 4G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
          else
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
      - name: Run tests
        run: nix develop --command just ci-test
        env:
          CARGO_BUILD_JOBS: 4
          CARGO_PROFILE_DEV_DEBUG: 0
          CARGO_INCREMENTAL: 0
      - name: Protocol compatibility
        run: nix develop --command just ci-protocol-compat
      - name: Failure bundle
        if: failure()
        uses: ./.github/actions/failure-bundle
        with:
          name: ci-fast
          replay-command: nix develop --command 'just ci-test && just ci-protocol-compat'
