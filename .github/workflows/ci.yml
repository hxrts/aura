name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: format
      - run: nix develop --command just ci-format

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: clippy
      - run: nix develop --command just ci-clippy

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: build
      - run: nix develop --command just ci-build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: test
      - name: Create swap space
        run: |
          if [ -f /swapfile ]; then
            if swapon --show | grep -q /swapfile; then
              echo "Swap already enabled"
            else
              sudo rm -f /swapfile
              sudo fallocate -l 4G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
          else
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
      - name: Run tests
        run: nix develop --command just ci-test
        env:
          CARGO_BUILD_JOBS: 4
          CARGO_PROFILE_DEV_DEBUG: 0
          CARGO_INCREMENTAL: 0

  unused-deps:
    name: Unused Deps
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: unused-deps
      - name: Check unused dependencies
        run: |
          nix develop .#nightly --command bash -c \
            'cargo +nightly udeps --all-targets 2>&1 | grep -E "^(unused|warning:)" || echo "No unused dependencies found"'
