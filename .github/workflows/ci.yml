name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Suppress Nix welcome message in CI
  AURA_SUPPRESS_NIX_WELCOME: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Fast checks (run first for quick feedback)
  # ─────────────────────────────────────────────────────────────────────────────

  book:
    name: Book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: book
      - name: Build documentation
        run: nix develop --command just ci-book

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: format
      - run: nix develop --command just ci-format

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: clippy
      - run: nix develop --command just ci-clippy

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: build
      - run: nix develop --command just ci-build

  harness-build:
    name: Harness Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-build
      - run: nix develop --command just ci-harness-build

  harness-contract:
    name: Harness Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-contract
      - run: nix develop --command just ci-harness-contract

  harness-nightly-replay:
    name: Harness Nightly Replay
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: harness-nightly-replay
      - run: nix develop --command just ci-harness-replay

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: test
      - name: Create swap space
        run: |
          # Create 4GB swap for memory-heavy compilation
          # Check if swap file already exists and is in use
          if [ -f /swapfile ]; then
            echo "Swap file exists, checking if in use..."
            if swapon --show | grep -q /swapfile; then
              echo "Swap already enabled at /swapfile, skipping creation"
            else
              # File exists but not used as swap - remove and recreate
              sudo rm -f /swapfile
              sudo fallocate -l 4G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
          else
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          echo "Swap status:"
          free -h
      - name: Run tests
        run: nix develop --command just ci-test
        env:
          # Reduce parallelism to lower peak disk usage from concurrent artifacts
          CARGO_BUILD_JOBS: 4
          # Disable debug info to reduce disk usage (~50% reduction in target size)
          CARGO_PROFILE_DEV_DEBUG: 0
          # Disable incremental compilation to reduce disk usage
          CARGO_INCREMENTAL: 0

  choreo-parity:
    name: Choreo Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: choreo-parity
      - name: Run parity gates
        run: nix develop --command just ci-choreo-parity
        env:
          CARGO_BUILD_JOBS: 4

  conformance-gate:
    name: Conformance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: conformance-gate
      - name: Verify conformance gate wiring
        run: nix develop --command just ci-conformance-policy
      - name: Run conformance gate
        run: nix develop --command just ci-conformance
        env:
          CARGO_BUILD_JOBS: 4
          AURA_CONFORMANCE_WRITE_ARTIFACTS: 1
          AURA_CONFORMANCE_ARTIFACT_DIR: artifacts/conformance
          AURA_CONFORMANCE_ROTATING_WINDOW: 8
          AURA_CONFORMANCE_ITF_SEED_WINDOW: 8
      - name: Upload conformance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/conformance
          if-no-files-found: warn

  agent-wasm:
    name: Agent WASM Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: agent-wasm
      - name: Check aura-agent wasm backends
        run: nix develop --command just ci-agent-wasm
        env:
          CARGO_BUILD_JOBS: 4

  effects:
    name: Effects Violations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: effects
      - run: nix develop --command just ci-effects

  doc-links:
    name: Doc Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/config/markdown-link-check.json"
          base-branch: "main"
          folder-path: "docs"

  # ─────────────────────────────────────────────────────────────────────────────
  # Optional checks (warnings only)
  # ─────────────────────────────────────────────────────────────────────────────

  unused-deps:
    name: Unused Deps
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          cache-name: unused-deps
      - name: Check unused dependencies
        run: |
          nix develop .#nightly --command bash -c \
            'cargo +nightly udeps --all-targets 2>&1 | grep -E "^(unused|warning:)" || echo "No unused dependencies found"'
