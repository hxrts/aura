[package]
name = "hello-choreo"
version = "0.1.0"
edition = "2021"
publish = false
include = ["src/**", "Cargo.toml"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.35", default-features = false, features = ["macros", "rt", "time"] }
futures = "0.3"
async-trait = "0.1"
aura-macros = { package = "hxrts-aura-macros", path = "../../crates/aura-macros", version = "=0.1.0" }
aura-core = { package = "hxrts-aura-core", path = "../../crates/aura-core", version = "=0.1.0" }
aura-mpst = { package = "hxrts-aura-mpst", path = "../../crates/aura-mpst", version = "=0.1.0" }
telltale = { workspace = true }
bincode = "1.3"
