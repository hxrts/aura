# Shared settings parity test:
#
# Phase 1 - Account setup:
# 1. Launch alice and bob actors.
# 2. Both fill account names and create accounts.
# 3. Both wait for ready state.
#
# Phase 2 - Settings navigation:
# 1. Both navigate to settings screen.
# 2. Verify settings screen is visible for both.
#
# Phase 3 - Parity verification:
# 1. Compare bob's semantic state with alice's.
#
# Success criteria: both actors reach identical settings state,
# parity check passes across frontend bindings.

id = "shared-settings-parity"
goal = "Execute the same shared Settings flow for two actors and compare semantic results."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 20000

[[steps]]
id = "alice-onboarding-visible"
action = "control_visible"
actor = "alice"
control_id = "onboarding_root"
timeout_ms = 30000

[[steps]]
id = "bob-onboarding-visible"
action = "control_visible"
actor = "bob"
control_id = "onboarding_root"
timeout_ms = 60000

[[steps]]
id = "alice-fill-account-name"
action = "fill"
actor = "alice"
field_id = "account_name"
value = "AliceUser"
timeout_ms = 4000

[[steps]]
id = "bob-fill-account-name"
action = "fill"
actor = "bob"
field_id = "account_name"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "alice-create-account"
action = "activate"
actor = "alice"
control_id = "onboarding_create_account_button"
timeout_ms = 4000

[[steps]]
id = "bob-create-account"
action = "activate"
actor = "bob"
control_id = "onboarding_create_account_button"
timeout_ms = 4000

[[steps]]
id = "alice-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-open-settings"
action = "navigate"
actor = "alice"
screen_id = "settings"
timeout_ms = 4000

[[steps]]
id = "bob-open-settings"
action = "navigate"
actor = "bob"
screen_id = "settings"
timeout_ms = 4000

[[steps]]
id = "alice-settings-visible"
action = "screen_is"
actor = "alice"
screen_id = "settings"
timeout_ms = 30000

[[steps]]
id = "bob-settings-visible"
action = "screen_is"
actor = "bob"
screen_id = "settings"
timeout_ms = 30000

[[steps]]
id = "bob-matches-alice-settings"
action = "parity_with_actor"
actor = "bob"
peer_actor = "alice"
timeout_ms = 5000
