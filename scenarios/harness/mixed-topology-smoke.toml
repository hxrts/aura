# Mixed topology smoke test (local + SSH):
#
# 1. Launch instances with local and ssh-dry-run topology.
# 2. Introduce a fault delay to simulate network conditions.
# 3. Restart the SSH instance (bob).
# 4. Send and wait for test message on local instance.
#
# Success criteria: scripted execution completes across mixed topology.

schema_version = 1
id = "mixed-topology-smoke"
goal = "Exercise local plus ssh-dry-run topology with state-machine execution."
execution_mode = "scripted"
required_capabilities = ["local", "ssh"]

[[steps]]
id = "launch"
action = "launch_instances"
expect = "launched"
timeout_ms = 5000

[[steps]]
id = "fault-delay"
action = "fault_delay"
timeout_ms = 50

[[steps]]
id = "ssh-restart"
action = "restart"
instance = "bob"
timeout_ms = 2000

[[steps]]
id = "local-send"
action = "send_keys"
instance = "alice"
expect = "mixed-topology-msg\n"
timeout_ms = 2000

[[steps]]
id = "local-wait"
action = "wait_for"
instance = "alice"
expect = "mixed-topology-msg"
timeout_ms = 2000
