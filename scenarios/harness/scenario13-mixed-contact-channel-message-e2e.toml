# Mixed contact, channel, and message end-to-end:
#
# Phase 1 - Account setup:
# 1. Launch alice and bob actors.
# 2. Both create accounts and wait for neighborhood ready state.
#
# Phase 2 - Contact establishment:
# 1. Both navigate to contacts screen.
# 2. Capture authority IDs for both actors.
# 3. Bob creates invitation for alice.
# 4. Alice accepts invitation via code.
# 5. Verify contact linked.
#
# Phase 3 - Home and channel setup:
# 1. Alice creates BridgeHome13 home.
# 2. Alice creates channel invitation for bob.
# 3. Bob accepts home invitation.
# 4. Both join amp-bridge channel.
#
# Phase 4 - Bidirectional messaging:
# 1. Alice sends message (hello-from-tu1).
# 2. Verify bob receives alice's message.
# 3. Bob sends message (hello-from-web).
# 4. Verify alice receives bob's message.
#
# Success criteria: contact established, channel joined,
# bidirectional messages delivered across frontend bindings.

id = "scenario13-mixed-contact-channel-message-e2e"
goal = "Use two actors as distinct users: accept a contact invite, join a shared channel, and verify bidirectional message delivery across supported frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "control_visible"
actor = "alice"
control_id = "onboarding_root"
timeout_ms = 60000

[[steps]]
id = "bob-onboarding-visible"
action = "control_visible"
actor = "bob"
control_id = "onboarding_root"
timeout_ms = 60000

