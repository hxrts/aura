# Mixed contact and channel-message end-to-end:
#
# Phase 1 - Account setup:
# 1. Launch alice and bob actors.
# 2. Both create accounts and wait for neighborhood ready state.
#
# Phase 2 - Contact establishment:
# 1. Both navigate to contacts screen.
# 2. Capture authority IDs for both actors.
# 3. Bob creates invitation for alice.
# 4. Alice accepts invitation via code.
# 5. Verify contact linked.
#
# Phase 3 - Shared chat setup:
# 1. Both actors navigate to chat.
# 2. Alice joins a shared named channel.
# 3. Alice invites Bob into that channel.
# 4. Bob joins the same channel from the pending invitation path.
#
# Phase 4 - Bidirectional messaging:
# 1. Alice sends a shared-channel message (hello-from-tu1).
# 2. Bob sends a shared-channel message (hello-from-web).
# 3. Verify alice receives bob's message.
# 4. Verify bob receives alice's message.
#
# Success criteria: contact established, shared channel reachable,
# bidirectional channel messages delivered across frontend bindings.

id = "scenario13-mixed-contact-channel-message-e2e"
goal = "Use two actors as distinct users: accept a contact invite and verify bidirectional shared-channel messaging across supported frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "control_visible"
actor = "alice"
control_id = "onboarding_root"
timeout_ms = 60000

[[steps]]
id = "bob-onboarding-visible"
action = "control_visible"
actor = "bob"
control_id = "onboarding_root"
timeout_ms = 60000

[[steps]]
id = "alice-fill-account-name"
action = "fill"
actor = "alice"
field_id = "account_name"
value = "AliceUser"
timeout_ms = 3000

[[steps]]
id = "alice-create-account"
action = "activate"
actor = "alice"
control_id = "onboarding_create_account_button"
timeout_ms = 3000

[[steps]]
id = "bob-fill-account-name"
action = "fill"
actor = "bob"
field_id = "account_name"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "bob-create-account"
action = "activate"
actor = "bob"
control_id = "onboarding_create_account_button"
timeout_ms = 4000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-neighborhood-visible"
action = "screen_is"
actor = "bob"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "bob-neighborhood-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-open-contacts"
action = "navigate"
actor = "alice"
screen_id = "contacts"
timeout_ms = 3000

[[steps]]
id = "bob-open-contacts"
action = "navigate"
actor = "bob"
screen_id = "contacts"
timeout_ms = 3000

[[steps]]
id = "capture-alice-authority-id"
action = "capture_current_authority_id"
actor = "alice"
name = "alice_authority_id"
timeout_ms = 3000

[[steps]]
id = "capture-bob-authority-id"
action = "capture_current_authority_id"
actor = "bob"
name = "bob_authority_id"
timeout_ms = 3000

[[steps]]
id = "bob-open-invite-modal"
action = "activate"
actor = "bob"
control_id = "contacts_create_invitation_button"
timeout_ms = 3000

[[steps]]
id = "bob-create-invite-modal-open"
action = "modal_open"
actor = "bob"
modal_id = "create_invitation"
timeout_ms = 12000

[[steps]]
id = "bob-fill-invite-receiver"
action = "fill"
actor = "bob"
field_id = "invitation_receiver"
value = "${alice_authority_id}"
timeout_ms = 3000

[[steps]]
id = "bob-create-invite"
action = "activate"
actor = "bob"
control_id = "modal_confirm_button"
timeout_ms = 3000

[[steps]]
id = "bob-invite-created"
action = "operation_state_is"
actor = "bob"
operation_id = "invitation_create"
operation_state = "succeeded"
timeout_ms = 30000

[[steps]]
id = "bob-read-invite-code"
action = "read_clipboard"
actor = "bob"
name = "invite_code"
timeout_ms = 12000

[[steps]]
id = "alice-open-accept-modal"
action = "activate"
actor = "alice"
control_id = "contacts_accept_invitation_button"
timeout_ms = 3000

[[steps]]
id = "alice-accept-modal-open"
action = "modal_open"
actor = "alice"
modal_id = "accept_invitation"
timeout_ms = 8000

[[steps]]
id = "alice-fill-invite-code"
action = "fill"
actor = "alice"
field_id = "invitation_code"
value = "${invite_code}"
timeout_ms = 12000

[[steps]]
id = "alice-submit-invite"
action = "activate"
actor = "alice"
control_id = "modal_confirm_button"
timeout_ms = 3000

[[steps]]
id = "alice-contact-count-one"
action = "list_count_is"
actor = "alice"
list_id = "contacts"
count = 1
timeout_ms = 30000

[[steps]]
id = "alice-open-chat"
action = "navigate"
actor = "alice"
screen_id = "chat"
timeout_ms = 3000

[[steps]]
id = "bob-contact-count-one"
action = "list_count_is"
actor = "bob"
list_id = "contacts"
count = 1
timeout_ms = 30000

[[steps]]
id = "bob-open-chat"
action = "navigate"
actor = "bob"
screen_id = "chat"
timeout_ms = 3000

[[steps]]
id = "alice-join-shared-channel"
action = "send_chat_command"
actor = "alice"
value = "join shared-parity-lab"
timeout_ms = 6000

[[steps]]
id = "alice-invite-bob-to-shared-channel"
action = "send_chat_command"
actor = "alice"
value = "invite ${bob_authority_id}"
timeout_ms = 6000

[[steps]]
id = "bob-join-shared-channel"
action = "send_chat_command"
actor = "bob"
value = "join shared-parity-lab"
timeout_ms = 6000

[[steps]]
id = "alice-send-message"
action = "send_chat_message"
actor = "alice"
value = "hello-from-tu1"
timeout_ms = 6000

[[steps]]
id = "bob-receives-alice-message"
action = "message_contains"
actor = "bob"
value = "hello-from-tu1"
timeout_ms = 120000

[[steps]]
id = "bob-send-message"
action = "send_chat_message"
actor = "bob"
value = "hello-from-web"
timeout_ms = 6000

[[steps]]
id = "alice-still-on-chat"
action = "screen_is"
actor = "alice"
screen_id = "chat"
timeout_ms = 12000

[[steps]]
id = "alice-receives-bob-message"
action = "message_contains"
actor = "alice"
value = "hello-from-web"
timeout_ms = 120000
