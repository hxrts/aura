# Contact and channel-message end-to-end:
#
# Phase 1 - Account setup:
# 1. Launch alice and bob actors.
# 2. Both create accounts and wait for neighborhood ready state.
#
# Phase 2 - Contact establishment:
# 1. Both navigate to contacts screen.
# 2. Capture authority IDs for both actors.
# 3. Bob creates invitation for alice.
# 4. Alice accepts invitation via code.
# 5. Verify contact linked.
#
# Phase 3 - Shared chat setup:
# 1. Alice creates a home from the neighborhood screen.
# 2. Both actors navigate to chat.
# 3. Alice creates a shared named channel.
# 4. Alice invites Bob into that channel.
# 5. Bob accepts the pending invitation/materialized channel path.
# 6. Bob explicitly enters the shared channel and verifies authoritative membership readiness.
#
# Phase 4 - Messaging:
# 1. Bob sends a shared-channel message from the currently stable harness path.
# 2. Verify alice receives bob's message on the shared channel.
#
# Success criteria: contact established, shared channel reachable,
# shared-channel delivery reaches the remote actor.
# In the TUI parity surface, inbound encrypted channel messages may render as
# `[sealed: ... bytes]` rather than plaintext, so the scenario asserts delivery
# by matching that stable sealed-message marker.

id = "scenario13-mixed-contact-channel-message-e2e"
goal = "Use two actors as distinct users: accept a contact invite and verify shared-channel message delivery on the currently stable harness path."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 30000

[[steps]]
id = "alice-onboarding-visible"
action = "screen_is"
actor = "alice"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "bob-onboarding-visible"
action = "screen_is"
actor = "bob"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "AliceUser"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "create_account"
actor = "bob"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-neighborhood-visible"
action = "screen_is"
actor = "bob"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "bob-neighborhood-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-create-home"
action = "create_home"
actor = "alice"
value = "Alice Home"
timeout_ms = 12000

[[steps]]
id = "alice-open-contacts"
action = "open_screen"
actor = "alice"
screen_id = "contacts"
timeout_ms = 3000

[[steps]]
id = "bob-open-contacts"
action = "open_screen"
actor = "bob"
screen_id = "contacts"
timeout_ms = 3000

[[steps]]
id = "capture-alice-authority-id"
action = "capture_current_authority_id"
actor = "alice"
name = "alice_authority_id"
timeout_ms = 3000

[[steps]]
id = "capture-bob-authority-id"
action = "capture_current_authority_id"
actor = "bob"
name = "bob_authority_id"
timeout_ms = 3000

[[steps]]
id = "bob-create-contact-invitation"
action = "create_contact_invitation"
actor = "bob"
value = "${alice_authority_id}"
timeout_ms = 30000

[[steps]]
id = "bob-invitation-code-ready"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "invitation_code_ready"
name = "invite_code"
timeout_ms = 30000

[[steps]]
id = "alice-accept-contact-invitation"
action = "accept_contact_invitation"
actor = "alice"
value = "${invite_code}"
timeout_ms = 12000

[[steps]]
id = "alice-contact-link-ready"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "contact_link_ready"
timeout_ms = 30000

[[steps]]
id = "alice-open-chat-before-join"
action = "open_screen"
actor = "alice"
screen_id = "chat"
timeout_ms = 6000

[[steps]]
id = "alice-join-shared-channel"
action = "create_channel"
actor = "alice"
value = "shared-parity-lab"
timeout_ms = 6000

[[steps]]
id = "alice-open-contacts-before-invite"
action = "open_screen"
actor = "alice"
screen_id = "contacts"
timeout_ms = 6000

[[steps]]
id = "alice-invite-bob-to-shared-channel"
action = "invite_actor_to_channel"
actor = "alice"
value = "${bob_authority_id}"
timeout_ms = 15000

[[steps]]
id = "bob-join-shared-channel"
action = "accept_pending_channel_invitation"
actor = "bob"
timeout_ms = 30000

[[steps]]
id = "bob-open-chat-after-accept"
action = "open_screen"
actor = "bob"
screen_id = "chat"
timeout_ms = 6000

[[steps]]
id = "bob-open-chat-before-send"
action = "open_screen"
actor = "bob"
screen_id = "chat"
timeout_ms = 6000

[[steps]]
id = "bob-send-message"
action = "send_chat_message"
actor = "bob"
value = "hello-from-web"
timeout_ms = 6000

[[steps]]
id = "alice-open-chat-before-receive"
action = "open_screen"
actor = "alice"
screen_id = "chat"
timeout_ms = 6000

[[steps]]
id = "alice-receives-bob-message"
action = "message_contains"
actor = "alice"
value = "[sealed:"
timeout_ms = 180000

[[steps]]
id = "alice-still-on-chat"
action = "screen_is"
actor = "alice"
screen_id = "chat"
timeout_ms = 12000
