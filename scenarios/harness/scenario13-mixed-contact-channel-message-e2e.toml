# Mixed contact and channel-message end-to-end:
#
# Phase 1 - Account setup:
# 1. Launch alice and bob actors.
# 2. Both create accounts and wait for neighborhood ready state.
#
# Phase 2 - Contact establishment:
# 1. Both navigate to contacts screen.
# 2. Capture authority IDs for both actors.
# 3. Bob creates invitation for alice.
# 4. Alice accepts invitation via code.
# 5. Verify contact linked.
#
# Phase 3 - Shared chat setup:
# 1. Both actors navigate to chat.
# 2. Alice joins a shared named channel.
# 3. Alice invites Bob into that channel.
# 4. Bob joins the same channel from the pending invitation path.
#
# Phase 4 - Bidirectional messaging:
# 1. Alice sends a shared-channel message (hello-from-tu1).
# 2. Bob sends a shared-channel message (hello-from-web).
# 3. Verify alice receives bob's message.
# 4. Verify bob receives alice's message.
#
# Success criteria: contact established, shared channel reachable,
# bidirectional channel messages delivered across frontend bindings.

id = "scenario13-mixed-contact-channel-message-e2e"
goal = "Use two actors as distinct users: accept a contact invite and verify bidirectional shared-channel messaging across supported frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "screen_is"
actor = "alice"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "bob-onboarding-visible"
action = "screen_is"
actor = "bob"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "AliceUser"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "create_account"
actor = "bob"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-neighborhood-visible"
action = "screen_is"
actor = "bob"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "bob-neighborhood-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-open-contacts"
action = "open_screen"
actor = "alice"
screen_id = "contacts"
timeout_ms = 3000

[[steps]]
id = "bob-open-contacts"
action = "open_screen"
actor = "bob"
screen_id = "contacts"
timeout_ms = 3000

[[steps]]
id = "capture-alice-authority-id"
action = "capture_current_authority_id"
actor = "alice"
name = "alice_authority_id"
timeout_ms = 3000

[[steps]]
id = "capture-bob-authority-id"
action = "capture_current_authority_id"
actor = "bob"
name = "bob_authority_id"
timeout_ms = 3000

[[steps]]
id = "bob-create-contact-invitation"
action = "create_contact_invitation"
actor = "bob"
value = "${alice_authority_id}"
name = "invite_code"
timeout_ms = 30000

[[steps]]
id = "alice-accept-contact-invitation"
action = "accept_contact_invitation"
actor = "alice"
value = "${invite_code}"
timeout_ms = 12000

[[steps]]
id = "alice-contact-link-ready"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "contact_link_ready"
timeout_ms = 30000

[[steps]]
id = "alice-join-shared-channel"
action = "join_channel"
actor = "alice"
value = "shared-parity-lab"
timeout_ms = 6000

[[steps]]
id = "alice-channel-membership-ready"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "channel_membership_ready"
timeout_ms = 120000

[[steps]]
id = "alice-invite-bob-to-shared-channel"
action = "invite_actor_to_channel"
actor = "alice"
value = "${bob_authority_id}"
timeout_ms = 6000

[[steps]]
id = "bob-join-shared-channel"
action = "accept_pending_channel_invitation"
actor = "bob"
timeout_ms = 30000

[[steps]]
id = "alice-message-delivery-ready"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "message_delivery_ready"
timeout_ms = 120000

[[steps]]
id = "alice-send-message"
action = "send_chat_message"
actor = "alice"
value = "hello-from-tu1"
timeout_ms = 6000

[[steps]]
id = "bob-receives-alice-message"
action = "message_contains"
actor = "bob"
value = "hello-from-tu1"
timeout_ms = 120000

[[steps]]
id = "bob-message-delivery-ready"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "message_delivery_ready"
timeout_ms = 120000

[[steps]]
id = "bob-send-message"
action = "send_chat_message"
actor = "bob"
value = "hello-from-web"
timeout_ms = 6000

[[steps]]
id = "alice-still-on-chat"
action = "screen_is"
actor = "alice"
screen_id = "chat"
timeout_ms = 12000

[[steps]]
id = "alice-receives-bob-message"
action = "message_contains"
actor = "alice"
value = "hello-from-web"
timeout_ms = 120000
