schema_version = 1
id = "scenario3-prelude"
goal = "Prepare two local instances with contact pairing for manual IRC slash-command validation."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Map → Street"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Map → Street"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
expect = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
expect = "3"
timeout_ms = 2000

[[steps]]
id = "alice-contacts-visible"
action = "wait_for"
instance = "alice"
expect = "Contacts"
timeout_ms = 5000

[[steps]]
id = "bob-contacts-visible"
action = "wait_for"
instance = "bob"
expect = "Contacts"
timeout_ms = 5000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
expect = "n"
timeout_ms = 2000

[[steps]]
id = "alice-invite-modal-visible"
action = "wait_for"
instance = "alice"
expect = "Create Invitation"
timeout_ms = 5000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
expect = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invite-created-visible"
action = "wait_for"
instance = "alice"
expect = "Invitation Created"
timeout_ms = 8000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
expect = "c"
timeout_ms = 2000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
expect = "esc"
timeout_ms = 2000

[[steps]]
id = "alice-back-on-contacts"
action = "wait_for"
instance = "alice"
expect = "Contacts (0)"
timeout_ms = 5000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
expect = "a"
timeout_ms = 2000

[[steps]]
id = "bob-accept-modal-visible"
action = "wait_for"
instance = "bob"
expect = "Accept Invitation"
timeout_ms = 5000

[[steps]]
id = "bob-import-invitation-from-alice-clipboard"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 2000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
expect = "enter"
timeout_ms = 2000

[[steps]]
id = "bob-contact-linked"
action = "wait_for"
instance = "bob"
expect = "Contacts (1)"
timeout_ms = 10000

[[steps]]
id = "alice-contact-linked"
action = "wait_for"
instance = "alice"
expect = "Contacts (1)"
timeout_ms = 10000

[[steps]]
id = "alice-set-bob-contact-nickname"
action = "send_keys"
instance = "alice"
expect = "eBob\n"
timeout_ms = 2000

[[steps]]
id = "alice-open-chat"
action = "send_keys"
instance = "alice"
expect = "2"
timeout_ms = 2000

[[steps]]
id = "bob-open-chat"
action = "send_keys"
instance = "bob"
expect = "2"
timeout_ms = 2000

[[steps]]
id = "alice-chat-visible"
action = "wait_for"
instance = "alice"
expect = "Chat"
timeout_ms = 5000

[[steps]]
id = "bob-chat-visible"
action = "wait_for"
instance = "bob"
expect = "Chat"
timeout_ms = 5000
