schema_version = 1
id = "scenario9-guardian-and-mfa-ceremonies-e2e"
goal = "Cover guardian setup modal opening/cancel flow plus MFA setup guard path from Settings."
execution_mode = "scripted"
required_capabilities = ["local"]

# Flow:
# 1) Launch Alice/Bob and create accounts.
# 2) Establish one contact (Bob) for Alice via invitation flow.
# 3) Open Settings -> Guardian Threshold and open Guardian Setup modal.
# 4) Assert guardian setup copy is visible, then cancel back to Settings.
# 5) Navigate to Authority and trigger MFA setup guard path.

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-created-visible"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-import-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-import"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-count-one"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "alice-open-settings"
action = "send_keys"
instance = "alice"
keys = "5"
timeout_ms = 2000

[[steps]]
id = "alice-settings-profile-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Profile"
timeout_ms = 8000

[[steps]]
id = "alice-nav-threshold"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-threshold-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Guardian Threshold"
timeout_ms = 8000

[[steps]]
id = "alice-open-guardian-setup"
action = "send_keys"
instance = "alice"
keys = "t"
timeout_ms = 2000

[[steps]]
id = "alice-guardian-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Guardian Setup"
timeout_ms = 8000

[[steps]]
id = "alice-guardian-select-copy-visible"
action = "wait_for"
instance = "alice"
pattern = "Step 1 of 3"
timeout_ms = 8000

[[steps]]
id = "alice-cancel-guardian-modal"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-threshold-visible-after-cancel"
action = "wait_for"
instance = "alice"
pattern = "Guardian Threshold"
timeout_ms = 8000

[[steps]]
id = "alice-nav-recovery"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-recovery-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Request Recovery"
timeout_ms = 8000

[[steps]]
id = "alice-nav-devices"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-devices-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Devices"
timeout_ms = 8000

[[steps]]
id = "alice-nav-authority"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-authority-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Authority"
timeout_ms = 8000

[[steps]]
id = "alice-open-mfa-setup"
action = "send_keys"
instance = "alice"
keys = "m"
timeout_ms = 2000

[[steps]]
id = "alice-mfa-guard-toast"
action = "expect_toast"
instance = "alice"
contains = "MFA requires at least 2 devices"
timeout_ms = 8000
