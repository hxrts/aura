# Semantic observation TUI smoke test:
#
# 1. Launch alice actor via PTY harness.
# 2. Wait for onboarding control visibility.
# 3. Fill account name and submit.
# 4. Wait for neighborhood screen and ready state.
# 5. Navigate to settings via semantic nav action.
# 6. Verify settings screen is visible.
#
# Success criteria: PTY harness semantic observation works for
# screens, controls, and readiness states.

id = "semantic-observation-tui-smoke"
goal = "Validate PTY harness structured observation using semantic waits for screens and modals."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "control_visible"
actor = "alice"
control_id = "onboarding_root"
timeout_ms = 30000

[[steps]]
id = "alice-fill-account-name"
action = "fill"
actor = "alice"
field_id = "account_name"
value = "Alice"
timeout_ms = 3000

[[steps]]
id = "alice-submit-account"
action = "activate"
actor = "alice"
control_id = "onboarding_create_account_button"
timeout_ms = 3000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 30000

[[steps]]
id = "alice-open-settings-via-nav-list"
action = "navigate"
actor = "alice"
screen_id = "settings"
timeout_ms = 3000

[[steps]]
id = "alice-settings-visible"
action = "screen_is"
actor = "alice"
screen_id = "settings"
timeout_ms = 30000
