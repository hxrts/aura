schema_version = 1
id = "semantic-observation-tui-smoke"
goal = "Validate PTY harness structured observation using semantic waits for screens and modals."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "wait_for"
instance = "alice"
control_id = "onboarding_root"
timeout_ms = 30000

[[steps]]
id = "alice-fill-account-name"
action = "fill_input"
instance = "alice"
field_id = "account_name"
value = "Alice"
timeout_ms = 3000

[[steps]]
id = "alice-submit-account"
action = "click_button"
instance = "alice"
control_id = "onboarding_create_account_button"
timeout_ms = 3000

[[steps]]
id = "alice-neighborhood-visible"
action = "wait_for"
instance = "alice"
screen_id = "neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-neighborhood-ready"
action = "wait_for"
instance = "alice"
readiness = "ready"
timeout_ms = 30000

[[steps]]
id = "alice-open-settings-via-nav-list"
action = "click_button"
instance = "alice"
list_id = "navigation"
item_id = "settings"
timeout_ms = 3000

[[steps]]
id = "alice-settings-visible"
action = "wait_for"
instance = "alice"
screen_id = "settings"
timeout_ms = 30000
