# Shared AMP delayed-witness transition test:
#
# Exercises an additive transition that stays pending while a witness is
# delayed/offline and then converges to the A2 live successor observation.

id = "amp-transition-delayed-witness-shared"
goal = "Validate shared AMP delayed/offline witness observations and convergence across frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 20000

[[steps]]
id = "alice-onboarding-visible"
action = "screen_is"
actor = "alice"
screen_id = "onboarding"
timeout_ms = 30000

[[steps]]
id = "bob-onboarding-visible"
action = "screen_is"
actor = "bob"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "AliceUser"
timeout_ms = 4000

[[steps]]
id = "bob-create-account"
action = "create_account"
actor = "bob"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "alice-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-delayed-witness-pending"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-delayed"
amp_transition_fixture = "delayed_witness_pending"
timeout_ms = 10000

[[steps]]
id = "bob-delayed-witness-pending"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-delayed"
amp_transition_fixture = "delayed_witness_pending"
timeout_ms = 10000

[[steps]]
id = "alice-delayed-pending-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "delayed-witness-pending"
timeout_ms = 10000

[[steps]]
id = "bob-delayed-pending-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "delayed-witness-pending"
timeout_ms = 10000

[[steps]]
id = "alice-delayed-a2-live"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-delayed"
amp_transition_fixture = "delayed_witness_a2_live"
timeout_ms = 10000

[[steps]]
id = "bob-delayed-a2-live"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-delayed"
amp_transition_fixture = "delayed_witness_a2_live"
timeout_ms = 10000

[[steps]]
id = "alice-delayed-a2-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "delayed-witness-a2-live"
timeout_ms = 10000

[[steps]]
id = "bob-delayed-a2-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "delayed-witness-a2-live"
timeout_ms = 10000

[[steps]]
id = "bob-matches-alice-delayed-transition"
action = "parity_with_actor"
actor = "bob"
peer_actor = "alice"
timeout_ms = 5000
