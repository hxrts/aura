# Global navigation and help modal end-to-end:
#
# 1. Boot two local instances and complete account setup.
# 2. Validate numeric navigation across core screens.
# 3. Validate Tab/BackTab cycling between screens.
# 4. Validate help modal open/close from global '?' hotkey.
# 5. Trigger slash-help toast and dismiss it with Esc.
#
# Success criteria: global navigation hotkeys, help modal, and toast
# dismissal work correctly.

id = "scenario4-global-nav-and-help-e2e"
goal = "Validate global navigation hotkeys, help modal behavior, and toast dismissal flow."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "control_visible"
actor = "alice"
control_id = "onboarding_root"
timeout_ms = 30000

[[steps]]
id = "bob-onboarding-visible"
action = "control_visible"
actor = "bob"
control_id = "onboarding_root"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "Alice"
timeout_ms = 4000

[[steps]]
id = "bob-create-account"
action = "create_account"
actor = "bob"
value = "Bob"
timeout_ms = 4000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 30000

[[steps]]
id = "bob-neighborhood-visible"
action = "screen_is"
actor = "bob"
screen_id = "neighborhood"
timeout_ms = 30000

[[steps]]
id = "bob-neighborhood-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 30000

[[steps]]
id = "alice-go-chat"
action = "input_text"
actor = "alice"
value = "2"
timeout_ms = 2000

[[steps]]
id = "alice-chat-visible"
action = "screen_is"
actor = "alice"
screen_id = "chat"
timeout_ms = 8000

[[steps]]
id = "alice-tab-to-contacts"
action = "press_key"
actor = "alice"
key = "tab"
timeout_ms = 2000

[[steps]]
id = "alice-contacts-visible"
action = "screen_is"
actor = "alice"
screen_id = "contacts"
timeout_ms = 8000

[[steps]]
id = "alice-backtab-to-chat"
action = "press_key"
actor = "alice"
key = "back_tab"
timeout_ms = 2000

[[steps]]
id = "alice-chat-visible-again"
action = "screen_is"
actor = "alice"
screen_id = "chat"
timeout_ms = 8000

[[steps]]
id = "alice-go-notifications"
action = "input_text"
actor = "alice"
value = "4"
timeout_ms = 2000

[[steps]]
id = "alice-notifications-visible"
action = "screen_is"
actor = "alice"
screen_id = "notifications"
timeout_ms = 8000

[[steps]]
id = "alice-go-settings"
action = "input_text"
actor = "alice"
value = "5"
timeout_ms = 2000

[[steps]]
id = "alice-settings-visible"
action = "screen_is"
actor = "alice"
screen_id = "settings"
timeout_ms = 8000

[[steps]]
id = "alice-open-help-modal"
action = "input_text"
actor = "alice"
value = "?"
timeout_ms = 2000

[[steps]]
id = "alice-help-modal-visible"
action = "modal_open"
actor = "alice"
modal_id = "help"
timeout_ms = 8000

[[steps]]
id = "alice-close-help-modal"
action = "press_key"
actor = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "alice-settings-visible-after-help"
action = "screen_is"
actor = "alice"
screen_id = "settings"
timeout_ms = 8000

[[steps]]
id = "alice-go-chat-for-help-toast"
action = "input_text"
actor = "alice"
value = "2"
timeout_ms = 2000

[[steps]]
id = "alice-send-help-command"
action = "send_chat_command"
actor = "alice"
value = "help"
timeout_ms = 2000

[[steps]]
id = "alice-help-toast-visible"
action = "toast_contains"
actor = "alice"
value = "Use ? for TUI help"
timeout_ms = 8000

[[steps]]
id = "alice-dismiss-help-toast"
action = "press_key"
actor = "alice"
key = "esc"
timeout_ms = 1000
