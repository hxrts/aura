# Settings, devices, and authority end-to-end:
#
# Phase 1 - Setup:
# 1. Launch alice and create account.
# 2. Wait for map to be ready.
#
# Phase 2 - Settings navigation:
# 1. Open Settings screen.
# 2. Exercise section navigation.
#
# Phase 3 - Nickname modal:
# 1. Open nickname edit modal.
# 2. Submit nickname change.
#
# Phase 4 - Device modals:
# 1. Trigger deterministic remove-device guard branch.
# 2. Open and submit add-device modal.
# 3. Open and close import-device modal.
#
# Phase 5 - Authority:
# 1. Trigger authority switch key path.
# 2. Verify single-authority guard branch.
#
# Success criteria: settings section navigation and modals for nickname,
# devices, and authority actions work correctly with guard branches.

schema_version = 1
id = "scenario8-settings-devices-authority-e2e"
goal = "Cover settings section navigation and settings modals for nickname, devices, and authority actions, including deterministic guard branches."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "alice-open-settings"
action = "send_keys"
instance = "alice"
keys = "5"
timeout_ms = 2000

[[steps]]
id = "alice-settings-profile-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Profile"
timeout_ms = 8000

[[steps]]
id = "alice-settings-nav-threshold"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-threshold-section-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Guardian Threshold"
timeout_ms = 8000

[[steps]]
id = "alice-settings-nav-recovery"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-recovery-section-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Request Recovery"
timeout_ms = 8000

[[steps]]
id = "alice-settings-nav-profile"
action = "send_key"
instance = "alice"
key = "up"
timeout_ms = 1000

[[steps]]
id = "alice-threshold-section-visible-again"
action = "wait_for"
instance = "alice"
pattern = "➤ Guardian Threshold"
timeout_ms = 8000

[[steps]]
id = "alice-settings-nav-profile-final"
action = "send_key"
instance = "alice"
key = "up"
timeout_ms = 1000

[[steps]]
id = "alice-profile-section-visible-again"
action = "wait_for"
instance = "alice"
pattern = "➤ Profile"
timeout_ms = 8000

[[steps]]
id = "alice-open-edit-nickname"
action = "send_keys"
instance = "alice"
keys = "e"
timeout_ms = 2000

[[steps]]
id = "alice-edit-nickname-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Edit Nickname"
timeout_ms = 8000

[[steps]]
id = "alice-edit-nickname-input"
action = "send_keys"
instance = "alice"
keys = "Ops"
timeout_ms = 1000

[[steps]]
id = "alice-edit-nickname-submit"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-profile-nickname-updated"
action = "wait_for"
instance = "alice"
pattern = "Nickname: Ops"
timeout_ms = 12000

[[steps]]
id = "alice-nav-devices-step1"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-nav-devices-threshold-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Guardian Threshold"
timeout_ms = 8000

[[steps]]
id = "alice-nav-devices-step2"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-nav-devices-recovery-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Request Recovery"
timeout_ms = 8000

[[steps]]
id = "alice-nav-devices-step3"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-devices-section-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Devices"
timeout_ms = 8000

[[steps]]
id = "alice-open-remove-device-flow"
action = "send_keys"
instance = "alice"
keys = "r"
timeout_ms = 2000

[[steps]]
id = "alice-remove-device-guard-toast"
action = "expect_toast"
instance = "alice"
value = "Cannot remove the current device"
timeout_ms = 8000

[[steps]]
id = "alice-open-add-device-modal"
action = "send_keys"
instance = "alice"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "alice-add-device-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Add Device — Step 1 of 3"
timeout_ms = 8000

[[steps]]
id = "alice-add-device-name"
action = "send_keys"
instance = "alice"
keys = "Spare"
timeout_ms = 1000

[[steps]]
id = "alice-add-device-submit"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-add-device-settle"
action = "fault_delay"
timeout_ms = 1500

[[steps]]
id = "alice-close-post-add-modal-if-open"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-devices-visible-after-add-submit"
action = "wait_for"
instance = "alice"
pattern = "➤ Devices"
timeout_ms = 12000

[[steps]]
id = "alice-open-device-import-modal"
action = "send_keys"
instance = "alice"
keys = "i"
timeout_ms = 2000

[[steps]]
id = "alice-device-import-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Import Device Enrollment Code"
timeout_ms = 8000

[[steps]]
id = "alice-close-device-import-modal"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-settings-nav-to-authority"
action = "send_key"
instance = "alice"
key = "down"
timeout_ms = 1000

[[steps]]
id = "alice-authority-section-visible"
action = "wait_for"
instance = "alice"
pattern = "➤ Authority"
timeout_ms = 8000

[[steps]]
id = "alice-authority-keypath-noop-single-authority"
action = "send_keys"
instance = "alice"
keys = "s"
timeout_ms = 2000
