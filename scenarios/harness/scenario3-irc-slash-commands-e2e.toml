[[steps]]
id = "alice-msg-missing"
action = "send_chat_command"
instance = "alice"
command = "msg ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-msg-missing-result"
action = "expect_toast"
instance = "alice"
level = "error"
contains = "Missing required argument: /msg requires <text>"
timeout_ms = 8000

[[steps]]
id = "alice-mode-missing"
action = "send_chat_command"
instance = "alice"
command = "mode slash-lab"
timeout_ms = 2000

[[steps]]
id = "alice-mode-missing-result"
action = "expect_toast"
instance = "alice"
level = "error"
contains = "Missing required argument: /mode requires <flags>"
timeout_ms = 8000

[[steps]]
id = "alice-mute-invalid"
action = "send_chat_command"
instance = "alice"
command = "mute ${bob_id} notaduration"
timeout_ms = 2000

[[steps]]
id = "alice-mute-invalid-result"
action = "expect_toast"
instance = "alice"
level = "error"
contains = "invalid duration"
timeout_ms = 8000
