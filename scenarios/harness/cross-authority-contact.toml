schema_version = 1
id = "cross-authority-contact-flow"
goal = "Verify contact establishment spans user/user and home/neighborhood authority workflows."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "bob-authority-id"
action = "get_authority_id"
instance = "bob"
var = "bob_id"
timeout_ms = 4000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-created"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-linked"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "alice-create-neighborhood"
action = "send_chat_command"
instance = "alice"
command = "neighborhood TerminologyNet"
timeout_ms = 2000

[[steps]]
id = "alice-create-neighborhood-result"
action = "expect_command_result"
instance = "alice"
contains = "neighborhood updated"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "alice-add-home-to-neighborhood"
action = "send_chat_command"
instance = "alice"
command = "nhadd home"
timeout_ms = 2000

[[steps]]
id = "alice-add-home-to-neighborhood-result"
action = "expect_command_result"
instance = "alice"
contains = "home added to neighborhood"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "alice-join-cross-lab"
action = "send_chat_command"
instance = "alice"
command = "join cross-lab"
timeout_ms = 2000

[[steps]]
id = "alice-join-cross-lab-result"
action = "expect_command_result"
instance = "alice"
contains = "membership updated"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-homeinvite-bob"
action = "send_chat_command"
instance = "alice"
command = "homeinvite ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-homeinvite-bob-result"
action = "expect_toast"
instance = "alice"
contains = "home invitation"
timeout_ms = 12000

[[steps]]
id = "bob-homeaccept"
action = "send_chat_command"
instance = "bob"
command = "homeaccept"
timeout_ms = 2000

[[steps]]
id = "bob-homeaccept-result"
action = "expect_toast"
instance = "bob"
contains = "home invitation"
timeout_ms = 12000

[[steps]]
id = "bob-add-home-to-neighborhood"
action = "send_chat_command"
instance = "bob"
command = "nhadd home"
timeout_ms = 2000

[[steps]]
id = "bob-add-home-to-neighborhood-result"
action = "expect_command_result"
instance = "bob"
contains = "home added to neighborhood"
consistency = "accepted"
timeout_ms = 12000
