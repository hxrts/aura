# Shared AMP normal transition test:
#
# Exercises the reducer-derived observation path for a normal AMP epoch
# transition from observed proposal to A2 live successor to A3 finalization.

id = "amp-transition-normal-shared"
goal = "Validate shared AMP normal epoch transition observations across frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 20000

[[steps]]
id = "alice-onboarding-visible"
action = "screen_is"
actor = "alice"
screen_id = "onboarding"
timeout_ms = 30000

[[steps]]
id = "bob-onboarding-visible"
action = "screen_is"
actor = "bob"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "AliceUser"
timeout_ms = 4000

[[steps]]
id = "bob-create-account"
action = "create_account"
actor = "bob"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "alice-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-normal-observed"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-normal"
amp_transition_fixture = "normal_observed"
timeout_ms = 10000

[[steps]]
id = "bob-normal-observed"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-normal"
amp_transition_fixture = "normal_observed"
timeout_ms = 10000

[[steps]]
id = "alice-observed-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "Observed"
timeout_ms = 10000

[[steps]]
id = "bob-observed-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "Observed"
timeout_ms = 10000

[[steps]]
id = "alice-normal-a2-live"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-normal"
amp_transition_fixture = "normal_a2_live"
timeout_ms = 10000

[[steps]]
id = "bob-normal-a2-live"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-normal"
amp_transition_fixture = "normal_a2_live"
timeout_ms = 10000

[[steps]]
id = "alice-a2-live-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "normal-a2-live"
timeout_ms = 10000

[[steps]]
id = "bob-a2-live-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "normal-a2-live"
timeout_ms = 10000

[[steps]]
id = "alice-normal-a3-finalized"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-normal"
amp_transition_fixture = "normal_a3_finalized"
timeout_ms = 10000

[[steps]]
id = "bob-normal-a3-finalized"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-normal"
amp_transition_fixture = "normal_a3_finalized"
timeout_ms = 10000

[[steps]]
id = "alice-a3-finalized-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "normal-a3-finalized"
timeout_ms = 10000

[[steps]]
id = "bob-a3-finalized-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "normal-a3-finalized"
timeout_ms = 10000

[[steps]]
id = "bob-matches-alice-normal-transition"
action = "parity_with_actor"
actor = "bob"
peer_actor = "alice"
timeout_ms = 5000
