id = "scenario12-mixed-device-enrollment-removal-e2e"
goal = "Use one TUI and one web instance to exercise out-of-band add-device acceptance and mirrored device removal completion on both sides."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "tui-onboarding-visible"
action = "control_visible"
actor = "tui"
control_id = "onboarding_root"
timeout_ms = 60000

[[steps]]
id = "web-onboarding-visible"
action = "control_visible"
actor = "web"
control_id = "onboarding_root"
timeout_ms = 60000

[[steps]]
id = "tui-fill-account-name"
action = "fill"
actor = "tui"
field_id = "account_name"
value = "TuiOwner"
timeout_ms = 3000

[[steps]]
id = "tui-create-account"
action = "activate"
actor = "tui"
control_id = "onboarding_create_account_button"
timeout_ms = 3000

[[steps]]
id = "tui-neighborhood-visible"
action = "screen_is"
actor = "tui"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "tui-neighborhood-ready"
action = "readiness_is"
actor = "tui"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "tui-open-settings"
action = "navigate"
actor = "tui"
screen_id = "settings"
timeout_ms = 3000

[[steps]]
id = "tui-open-devices-section"
action = "activate_list_item"
actor = "tui"
list_id = "settings_sections"
item_id = "devices"
timeout_ms = 3000

[[steps]]
id = "tui-open-add-device-modal"
action = "activate"
actor = "tui"
control_id = "settings_add_device_button"
timeout_ms = 3000

[[steps]]
id = "tui-add-device-modal-open"
action = "modal_open"
actor = "tui"
modal_id = "add_device"
timeout_ms = 8000

[[steps]]
id = "tui-fill-device-name"
action = "fill"
actor = "tui"
field_id = "device_name"
value = "WebApp"
timeout_ms = 3000

[[steps]]
id = "tui-submit-add-device"
action = "activate"
actor = "tui"
control_id = "modal_confirm_button"
timeout_ms = 3000

[[steps]]
id = "tui-device-enrollment-submitting"
action = "operation_state_is"
actor = "tui"
operation_id = "device_enrollment"
operation_state = "submitting"
timeout_ms = 15000

[[steps]]
id = "tui-copy-device-code"
action = "activate"
actor = "tui"
control_id = "modal_copy_button"
timeout_ms = 3000

[[steps]]
id = "tui-read-device-code"
action = "read_clipboard"
actor = "tui"
name = "device_code"
timeout_ms = 12000

[[steps]]
id = "web-fill-device-code"
action = "fill"
actor = "web"
field_id = "device_import_code"
value = "${device_code}"
timeout_ms = 12000

[[steps]]
id = "web-import-device-code"
action = "activate"
actor = "web"
control_id = "onboarding_import_device_button"
timeout_ms = 4000

[[steps]]
id = "web-device-import-succeeded"
action = "operation_state_is"
actor = "web"
operation_id = "device_enrollment"
operation_state = "succeeded"
timeout_ms = 30000

[[steps]]
id = "web-open-settings"
action = "navigate"
actor = "web"
screen_id = "settings"
timeout_ms = 3000

[[steps]]
id = "web-open-devices-section"
action = "activate_list_item"
actor = "web"
list_id = "settings_sections"
item_id = "devices"
timeout_ms = 3000

[[steps]]
id = "web-devices-count-two"
action = "list_count_is"
actor = "web"
list_id = "devices"
count = 2
timeout_ms = 20000

[[steps]]
id = "tui-still-submitting"
action = "operation_state_is"
actor = "tui"
operation_id = "device_enrollment"
operation_state = "submitting"
timeout_ms = 10000

[[steps]]
id = "tui-cancel-pending-enrollment"
action = "activate"
actor = "tui"
control_id = "modal_cancel_button"
timeout_ms = 3000

[[steps]]
id = "tui-back-on-settings"
action = "screen_is"
actor = "tui"
screen_id = "settings"
timeout_ms = 10000

[[steps]]
id = "web-open-remove-device"
action = "activate"
actor = "web"
control_id = "settings_remove_device_button"
timeout_ms = 4000

[[steps]]
id = "web-device-select-modal-open"
action = "modal_open"
actor = "web"
modal_id = "select_device_to_remove"
timeout_ms = 10000

[[steps]]
id = "web-choose-device"
action = "activate"
actor = "web"
control_id = "modal_confirm_button"
timeout_ms = 3000

[[steps]]
id = "web-confirm-remove-modal-open"
action = "modal_open"
actor = "web"
modal_id = "confirm_remove_device"
timeout_ms = 10000

[[steps]]
id = "web-confirm-remove-device"
action = "activate"
actor = "web"
control_id = "modal_confirm_button"
timeout_ms = 3000

[[steps]]
id = "web-devices-count-one"
action = "list_count_is"
actor = "web"
list_id = "devices"
count = 1
timeout_ms = 30000
