schema_version = 1
id = "scenario12-mixed-device-enrollment-removal-e2e"
goal = "Use one TUI and one web instance to exercise out-of-band add-device acceptance and mirrored device removal completion on both sides."
execution_mode = "scripted"
required_capabilities = ["local", "browser"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "tui-ready"
action = "wait_for"
instance = "tui"
pattern = "Welcome to Aura"
timeout_ms = 180000

[[steps]]
id = "web-ready"
action = "wait_for"
instance = "web"
pattern = "Welcome to Aura"
screen_source = "dom"
timeout_ms = 60000

[[steps]]
id = "tui-create-account"
action = "send_keys"
instance = "tui"
keys = "TuiOwner\n"
timeout_ms = 3000

[[steps]]
id = "tui-map-ready"
action = "wait_for"
instance = "tui"
pattern = "Map → Limited"
timeout_ms = 120000

[[steps]]
id = "tui-open-settings"
action = "send_keys"
instance = "tui"
keys = "5"
timeout_ms = 2000

[[steps]]
id = "tui-settings-profile"
action = "wait_for"
instance = "tui"
pattern = "➤ Profile"
timeout_ms = 8000

[[steps]]
id = "tui-settings-to-guardians"
action = "send_key"
instance = "tui"
key = "down"
timeout_ms = 1200

[[steps]]
id = "tui-settings-guardians"
action = "wait_for"
instance = "tui"
pattern = "➤ Guardian Threshold"
timeout_ms = 8000

[[steps]]
id = "tui-settings-to-recovery"
action = "send_key"
instance = "tui"
key = "down"
timeout_ms = 1200

[[steps]]
id = "tui-settings-recovery"
action = "wait_for"
instance = "tui"
pattern = "➤ Request Recovery"
timeout_ms = 8000

[[steps]]
id = "tui-settings-to-devices"
action = "send_key"
instance = "tui"
key = "down"
timeout_ms = 1200

[[steps]]
id = "tui-settings-devices"
action = "wait_for"
instance = "tui"
pattern = "➤ Devices"
timeout_ms = 8000

[[steps]]
id = "tui-open-add-device-modal"
action = "send_keys"
instance = "tui"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "tui-add-device-modal-visible"
action = "wait_for"
instance = "tui"
pattern = "Add Device — Step 1 of 3"
timeout_ms = 8000

[[steps]]
id = "tui-submit-add-device"
action = "send_keys"
instance = "tui"
keys = "WebApp\n"
timeout_ms = 2000

[[steps]]
id = "tui-device-enrollment-submitting"
action = "wait_for"
instance = "tui"
operation_id = "device_enrollment"
operation_state = "submitting"
timeout_ms = 15000

[[steps]]
id = "tui-device-enrollment-ceremony-visible"
action = "wait_for"
instance = "tui"
pattern = "Import this code on the new device"
timeout_ms = 15000

[[steps]]
id = "tui-copy-device-enrollment-code"
action = "send_keys"
instance = "tui"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "tui-copy-toast-visible"
action = "expect_toast"
instance = "tui"
contains = "Copied to clipboard"
timeout_ms = 8000

[[steps]]
id = "tui-read-device-code"
action = "read_clipboard"
instance = "tui"
var = "device_code"
timeout_ms = 12000

[[steps]]
id = "web-fill-device-code"
action = "fill_input"
instance = "web"
field_id = "device_import_code"
value = "${device_code}"
timeout_ms = 12000

[[steps]]
id = "web-import-device-code"
action = "click_button"
instance = "web"
control_id = "onboarding_import_device_button"
timeout_ms = 4000

[[steps]]
id = "web-device-import-succeeded"
action = "wait_for"
instance = "web"
operation_id = "device_enrollment"
operation_state = "succeeded"
timeout_ms = 30000

[[steps]]
id = "web-device-imported"
action = "wait_for"
instance = "web"
control_id = "nav_settings"
timeout_ms = 30000

[[steps]]
id = "web-open-settings"
action = "click_button"
instance = "web"
control_id = "nav_settings"
timeout_ms = 4000

[[steps]]
id = "web-open-devices"
action = "click_button"
instance = "web"
selector = "#aura-settings-section-devices"
timeout_ms = 4000

[[steps]]
id = "web-devices-count-two"
action = "wait_for"
instance = "web"
pattern = "Devices: 2"
timeout_ms = 20000

[[steps]]
id = "tui-still-waiting-for-acceptance"
action = "wait_for"
instance = "tui"
operation_id = "device_enrollment"
operation_state = "submitting"
timeout_ms = 10000

[[steps]]
id = "tui-cancel-pending-enrollment"
action = "send_key"
instance = "tui"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "tui-enrollment-canceled-toast"
action = "expect_toast"
instance = "tui"
contains = "canceled"
timeout_ms = 10000

[[steps]]
id = "web-dismiss-enrollment-toast"
action = "send_key"
instance = "web"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "web-still-on-devices"
action = "wait_for"
instance = "web"
pattern = "Remove Device"
timeout_ms = 8000

[[steps]]
id = "web-open-device-select"
action = "click_button"
instance = "web"
label = "Remove Device"
timeout_ms = 4000

[[steps]]
id = "web-device-select-modal-visible"
action = "wait_for"
instance = "web"
pattern = "Select Device to Remove"
timeout_ms = 10000

[[steps]]
id = "web-choose-device-to-remove"
action = "send_key"
instance = "web"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "web-remove-confirm-modal-visible"
action = "wait_for"
instance = "web"
pattern = "Confirm Device Removal"
timeout_ms = 10000

[[steps]]
id = "web-focus-remove-confirm"
action = "send_key"
instance = "web"
key = "tab"
timeout_ms = 1000

[[steps]]
id = "web-confirm-remove-device"
action = "send_key"
instance = "web"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "web-device-removal-complete"
action = "wait_for"
instance = "web"
pattern = "Devices: 1"
timeout_ms = 30000
