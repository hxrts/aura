# Mixed device enrollment and removal end-to-end:
#
# Phase 1 - Account creation:
# 1. Launch alice and bob actors.
# 2. Alice creates account (AliceOwner).
# 3. Alice waits for neighborhood ready state.
#
# Phase 2 - Device enrollment:
# 1. Alice opens Settings and add-device modal.
# 2. Alice enters device name (BobApp) and submits.
# 3. Alice copies device enrollment code.
# 4. Bob imports device code and completes enrollment.
#
# Phase 3 - Device verification and removal:
# 1. Bob navigates to Settings devices section.
# 2. Verify device count is 2.
# 3. Bob opens remove-device modal and selects device.
# 4. Bob confirms device removal.
# 5. Verify device count is 1.
#
# Success criteria: device enrollment via out-of-band code succeeds,
# device removal completes with correct count updates.

id = "scenario12-mixed-device-enrollment-removal-e2e"
goal = "Use two actors to exercise out-of-band add-device acceptance and mirrored device removal completion across supported frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "screen_is"
actor = "alice"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "bob-onboarding-visible"
action = "screen_is"
actor = "bob"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "AliceOwner"
timeout_ms = 3000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 120000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-open-settings"
action = "open_screen"
actor = "alice"
screen_id = "settings"
timeout_ms = 3000

[[steps]]
id = "alice-settings-visible"
action = "screen_is"
actor = "alice"
screen_id = "settings"
timeout_ms = 8000

[[steps]]
id = "alice-start-device-enrollment"
action = "start_device_enrollment"
actor = "alice"
value = "BobApp"
name = "device_code"
timeout_ms = 120000

[[steps]]
id = "alice-device-code-ready"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "device_enrollment_code_ready"
name = "device_code"
timeout_ms = 30000

[[steps]]
id = "bob-import-device-code"
action = "import_device_enrollment_code"
actor = "bob"
value = "${device_code}"
timeout_ms = 4000

[[steps]]
id = "bob-neighborhood-visible-after-import"
action = "screen_is"
actor = "bob"
screen_id = "neighborhood"
timeout_ms = 30000

[[steps]]
id = "bob-neighborhood-ready-after-import"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 30000

[[steps]]
id = "bob-open-settings"
action = "open_screen"
actor = "bob"
screen_id = "settings"
timeout_ms = 3000

[[steps]]
id = "bob-settings-visible"
action = "screen_is"
actor = "bob"
screen_id = "settings"
timeout_ms = 8000

[[steps]]
id = "bob-open-devices-section"
action = "open_settings_section"
actor = "bob"
section = "devices"
timeout_ms = 3000

[[steps]]
id = "bob-devices-section-selected"
action = "selection_is"
actor = "bob"
list_id = "settings_sections"
item_id = "devices"
timeout_ms = 8000

[[steps]]
id = "bob-devices-count-two"
action = "list_count_is"
actor = "bob"
list_id = "devices"
count = 2
timeout_ms = 20000

[[steps]]
id = "bob-remove-selected-device"
action = "remove_selected_device"
actor = "bob"
timeout_ms = 8000

[[steps]]
id = "bob-devices-count-one"
action = "list_count_is"
actor = "bob"
list_id = "devices"
count = 1
timeout_ms = 30000
