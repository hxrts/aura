# Moderator assignment and kick flow:
#
# Phase 1 - Setup:
# 1. Launch three instances (alice, bob, carol).
# 2. Create accounts and establish contacts between all parties.
# 3. Alice creates neighborhood and home, invites bob and carol.
#
# Phase 2 - Channel and invitations:
# 1. Alice creates mod-lab channel and joins.
# 2. Alice sends home invites to bob and carol.
# 3. Bob and carol accept home invites and join channel.
#
# Phase 3 - Moderator enforcement:
# 1. Alice attempts to op bob (should fail, only Members allowed).
# 2. Bob attempts to kick carol (should fail, not a moderator).
# 3. Alice kicks carol (should succeed as channel owner).
#
# Success criteria: moderator designation rejects non-Members,
# non-moderators cannot kick, owners can kick.

schema_version = 1
id = "moderator-assign-flow"
goal = "Verify moderator designation enforces Member-only targets and moderator kick flow."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "carol-ready"
action = "wait_for"
instance = "carol"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "carol-create-account"
action = "send_keys"
instance = "carol"
keys = "Carol\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "carol-map-ready"
action = "wait_for"
instance = "carol"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "carol-open-contacts"
action = "send_keys"
instance = "carol"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal-bob"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation-bob"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-visible-bob"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation-bob"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "copy-propagated-bob"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation-bob"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal-carol"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation-carol"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-visible-carol"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation-carol"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "copy-propagated-carol"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation-carol"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "carol-open-accept-modal"
action = "send_keys"
instance = "carol"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "carol-import-invitation"
action = "send_clipboard"
instance = "carol"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "carol-submit-invitation"
action = "send_key"
instance = "carol"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contacts-linked"
action = "wait_for"
instance = "alice"
pattern = "Contacts (2)"
timeout_ms = 12000

[[steps]]
id = "bob-authority-id"
