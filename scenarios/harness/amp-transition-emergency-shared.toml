# Shared AMP emergency transition test:
#
# Exercises emergency quarantine alarm, quorum approval, immediate cutover,
# suspect exclusion, cryptoshred confirmation, unreadable post-cutover marker,
# and explicit authority/recovery governance non-removal evidence.

id = "amp-transition-emergency-shared"
goal = "Validate shared AMP emergency quarantine, cryptoshred, and governance observations across frontend bindings."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 20000

[[steps]]
id = "alice-onboarding-visible"
action = "screen_is"
actor = "alice"
screen_id = "onboarding"
timeout_ms = 30000

[[steps]]
id = "bob-onboarding-visible"
action = "screen_is"
actor = "bob"
screen_id = "onboarding"
timeout_ms = 60000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "AliceUser"
timeout_ms = 4000

[[steps]]
id = "bob-create-account"
action = "create_account"
actor = "bob"
value = "BobUser"
timeout_ms = 4000

[[steps]]
id = "alice-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "bob-ready"
action = "readiness_is"
actor = "bob"
readiness = "ready"
timeout_ms = 120000

[[steps]]
id = "alice-quarantine-alarm"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-emergency"
amp_transition_fixture = "emergency_quarantine_alarm"
timeout_ms = 10000

[[steps]]
id = "bob-quarantine-alarm"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-emergency"
amp_transition_fixture = "emergency_quarantine_alarm"
timeout_ms = 10000

[[steps]]
id = "alice-quarantine-alarm-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "emergency-alarm"
timeout_ms = 10000

[[steps]]
id = "bob-quarantine-alarm-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "emergency-alarm"
timeout_ms = 10000

[[steps]]
id = "alice-quarantine-approved"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-emergency"
amp_transition_fixture = "emergency_quarantine_approved"
timeout_ms = 10000

[[steps]]
id = "bob-quarantine-approved"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-emergency"
amp_transition_fixture = "emergency_quarantine_approved"
timeout_ms = 10000

[[steps]]
id = "alice-quarantine-approved-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "suspect-authority"
timeout_ms = 10000

[[steps]]
id = "bob-quarantine-approved-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "suspect-authority"
timeout_ms = 10000

[[steps]]
id = "alice-cryptoshred-confirmed"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-emergency"
amp_transition_fixture = "emergency_cryptoshred_confirmed"
timeout_ms = 10000

[[steps]]
id = "bob-cryptoshred-confirmed"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-emergency"
amp_transition_fixture = "emergency_cryptoshred_confirmed"
timeout_ms = 10000

[[steps]]
id = "alice-cryptoshred-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "cryptoshred-confirmed"
timeout_ms = 10000

[[steps]]
id = "bob-cryptoshred-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "cryptoshred-confirmed"
timeout_ms = 10000

[[steps]]
id = "alice-governance-rights-unaffected"
action = "publish_amp_transition_fixture"
actor = "alice"
value = "amp-emergency"
amp_transition_fixture = "governance_rights_unaffected"
timeout_ms = 10000

[[steps]]
id = "bob-governance-rights-unaffected"
action = "publish_amp_transition_fixture"
actor = "bob"
value = "amp-emergency"
amp_transition_fixture = "governance_rights_unaffected"
timeout_ms = 10000

[[steps]]
id = "alice-governance-event"
action = "runtime_event_occurred"
actor = "alice"
runtime_event_kind = "amp_channel_transition_updated"
value = "recovery-governance-rights-unaffected"
timeout_ms = 10000

[[steps]]
id = "bob-governance-event"
action = "runtime_event_occurred"
actor = "bob"
runtime_event_kind = "amp_channel_transition_updated"
value = "recovery-governance-rights-unaffected"
timeout_ms = 10000

[[steps]]
id = "bob-matches-alice-emergency-transition"
action = "parity_with_actor"
actor = "bob"
peer_actor = "alice"
timeout_ms = 5000
