# Social topology end-to-end:
#
# Phase 1 - Bootstrap relationship and naming precedence:
# 1. Launch alice and bob instances.
# 2. Exchange invitations and link contacts.
# 3. Verify effective-name ordering checks.
#
# Phase 2 - Create homes and home messages:
# 1. Each actor creates one home.
# 2. Each actor posts one message in a home channel.
#
# Phase 3 - Form neighborhood:
# 1. Form neighborhood between homes.
# 2. Verify storage allocation and accounting effects.
#
# Phase 4 - Access-level behavior:
# 1. Verify access-level-gated visibility.
# 2. Verify access transitions work correctly.
#
# Phase 5 - Discovery and relay fallback:
# 1. Validate message delivery across fallback routing layers.
#
# Phase 6 - Capability-gated governance:
# 1. Verify denied action without capability.
# 2. Verify allowed action after grant.
#
# Success criteria: topology and access behavior are policy-consistent end-to-end.

schema_version = 1
id = "scenario2-social-topology-e2e"
goal = "Complete work/scenario2.md social topology flow with stable harness assertions."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-created-visible"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "alice-copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-linked"
action = "fault_delay"
timeout_ms = 1500

[[steps]]
id = "bob-contact-linked"
action = "wait_for"
instance = "bob"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "bob-authority-id"
action = "get_authority_id"
instance = "bob"
var = "bob_id"
timeout_ms = 4000

[[steps]]
id = "alice-authority-id"
action = "get_authority_id"
instance = "alice"
var = "alice_id"
timeout_ms = 4000

[[steps]]
id = "alice-open-chat"
action = "send_keys"
instance = "alice"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "bob-open-chat"
action = "send_keys"
instance = "bob"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "alice-set-suggestion-nick"
action = "send_chat_command"
instance = "alice"
command = "nick Alice-Maple"
timeout_ms = 2000

[[steps]]
id = "alice-set-suggestion-nick-result"
action = "expect_command_result"
instance = "alice"
status = "ok"
reason_code = "none"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "bob-set-suggestion-nick"
action = "send_chat_command"
instance = "bob"
command = "nick Bob-Oak"
timeout_ms = 2000

[[steps]]
id = "bob-set-suggestion-nick-result"
action = "expect_command_result"
instance = "bob"
status = "ok"
reason_code = "none"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "alice-contacts-for-local-override"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-set-local-override"
action = "send_keys"
instance = "alice"
keys = "eNeighbor Bob\n"
timeout_ms = 2000

[[steps]]
id = "alice-sees-neighbor-bob"
action = "fault_delay"
timeout_ms = 1500

[[steps]]
id = "bob-contacts-see-alice-maple"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-sees-alice-maple"
action = "wait_for"
instance = "bob"
pattern = "Contacts (1)"
timeout_ms = 8000

[[steps]]
id = "alice-back-chat"
action = "send_keys"
instance = "alice"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "bob-back-chat"
action = "send_keys"
instance = "bob"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "alice-open-neighborhood"
action = "send_keys"
instance = "alice"
keys = "1"
timeout_ms = 2000

[[steps]]
id = "alice-create-home-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-home-title"
action = "wait_for"
instance = "alice"
pattern = "Create New Home"
timeout_ms = 8000

[[steps]]
id = "alice-create-home-name"
action = "send_keys"
instance = "alice"
keys = "AliceHomeS2\n"
timeout_ms = 3000

[[steps]]
id = "alice-home-created"
action = "expect_toast"
instance = "alice"
value = "Home 'AliceHomeS2' created"
timeout_ms = 12000

[[steps]]
id = "alice-back-chat-after-home"
action = "send_keys"
instance = "alice"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "bob-open-neighborhood"
action = "send_keys"
instance = "bob"
keys = "1"
timeout_ms = 2000

[[steps]]
id = "bob-create-home-modal"
action = "send_keys"
instance = "bob"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "bob-create-home-title"
action = "wait_for"
instance = "bob"
pattern = "Create New Home"
timeout_ms = 8000

[[steps]]
id = "bob-create-home-name"
action = "send_keys"
instance = "bob"
keys = "BobHomeS2\n"
timeout_ms = 3000

[[steps]]
id = "bob-home-created"
action = "expect_toast"
instance = "bob"
value = "Home 'BobHomeS2' created"
timeout_ms = 12000

[[steps]]
id = "bob-back-chat-after-home"
action = "send_keys"
instance = "bob"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "alice-join"
action = "send_chat_command"
instance = "alice"
command = "join slash-lab"
timeout_ms = 2000

[[steps]]
id = "alice-join-result"
action = "expect_command_result"
instance = "alice"
status = "ok"
reason_code = "none"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-invite-bob"
action = "send_chat_command"
instance = "alice"
command = "invite ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-invite-bob-result"
action = "expect_command_result"
instance = "alice"
status = "ok"
reason_code = "none"
consistency = "enforced"
timeout_ms = 12000

[[steps]]
id = "bob-join"
action = "send_chat_command"
instance = "bob"
command = "join slash-lab"
timeout_ms = 2000

[[steps]]
id = "bob-join-result"
action = "expect_command_result"
instance = "bob"
status = "ok"
reason_code = "none"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-neighborhood"
action = "send_chat_command"
instance = "alice"
command = "neighborhood North-Block-S2"
timeout_ms = 2000

[[steps]]
id = "alice-neighborhood-result"
action = "expect_command_result"
instance = "alice"
status = "ok"
reason_code = "none"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "alice-nhadd"
action = "send_chat_command"
instance = "alice"
command = "nhadd home"
timeout_ms = 2000

[[steps]]
id = "alice-nhadd-result"
action = "expect_command_result"
instance = "alice"
status = "ok"
reason_code = "none"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "alice-nhlink"
action = "send_chat_command"
instance = "alice"
command = "nhlink home"
timeout_ms = 2000

[[steps]]
id = "alice-nhlink-result"
action = "expect_denied"
instance = "alice"
reason = "permission"
status = "denied"
reason_code = "permission_denied"
timeout_ms = 12000

[[steps]]
id = "alice-homeinvite"
action = "send_chat_command"
instance = "alice"
command = "homeinvite ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-homeinvite-result"
action = "expect_command_result"
instance = "alice"
status = "ok"
reason_code = "none"
consistency = "accepted"
timeout_ms = 12000

[[steps]]
id = "bob-homeaccept"
action = "send_chat_command"
