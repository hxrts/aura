[[steps]]
id = "alice-open-neighborhood-screen"
action = "send_keys"
instance = "alice"
keys = "1"
timeout_ms = 2000

[[steps]]
id = "alice-neighborhood-map-visible"
action = "wait_for"
instance = "alice"
pattern = "Map"
timeout_ms = 8000

[[steps]]
id = "alice-depth-partial"
