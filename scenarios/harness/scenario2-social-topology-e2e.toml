schema_version = 1
id = "scenario2-social-topology-e2e"
goal = "Complete work/scenario2.md social topology flow with stable harness assertions."
execution_mode = "scripted"
required_capabilities = ["local"]

# User flow reference (from work/scenario2.md):
# Phase 1 - Bootstrap relationship and naming precedence:
# invitation exchange, contact linkage, and effective-name ordering checks.
# Phase 2 - Create homes and home messages:
# each actor creates one home and posts one message in a home channel.
# Phase 3 - Form a neighborhood and verify storage allocation/accounting effects.
# Phase 4 - Access-level behavior:
# verify access-level-gated visibility and access transitions.
# Phase 5 - Discovery and relay fallback:
# validate message delivery across fallback routing layers.
# Phase 6 - Capability-gated governance:
# denied action without capability, then allowed action after grant.
# Success criteria: topology and access behavior are policy-consistent end-to-end.

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

