timeout_ms = 8000

[[steps]]
id = "alice-exit-home-full"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-back-chat-after-neighborhood"
action = "send_keys"
instance = "alice"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "bob-back-chat-after-neighborhood"
