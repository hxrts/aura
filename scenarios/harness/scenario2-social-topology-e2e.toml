action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "alice-copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-linked"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "bob-contact-linked"
action = "wait_for"
instance = "bob"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
