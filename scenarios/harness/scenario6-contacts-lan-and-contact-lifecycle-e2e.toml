# Contacts LAN and lifecycle end-to-end:
#
# Phase 1 - Setup:
# 1. Launch alice and bob, create accounts.
# 2. Link bob as a contact via invitation flow.
#
# Phase 2 - LAN key paths:
# 1. Exercise 'd' key for LAN rescan.
# 2. Exercise 'p' key for focus-toggle/no-peer guard.
#
# Phase 3 - Contact actions:
# 1. Exercise Enter on contacts list to view detail.
# 2. Exercise 'c' key to start chat from selected contact.
#
# Phase 4 - Contact removal:
# 1. Exercise 'r' key to remove contact.
# 2. Confirm contact count transitions from 1 to 0.
#
# Success criteria: LAN rescan, focus behavior, start-chat,
# and remove-contact lifecycle work correctly.

schema_version = 1
id = "scenario6-contacts-lan-and-contact-lifecycle-e2e"
goal = "Cover contacts screen LAN rescan/focus behavior plus start-chat and remove-contact lifecycle."
execution_mode = "scripted"
required_capabilities = ["local"]

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-created-visible"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "alice-copy-toast-visible"
action = "expect_toast"
instance = "alice"
value = "Copied to clipboard"
timeout_ms = 8000

[[steps]]
id = "alice-dismiss-copy-toast"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-count-one"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "alice-rescan-lan"
action = "send_keys"
instance = "alice"
keys = "d"
timeout_ms = 2000

[[steps]]
id = "alice-rescan-status-visible"
action = "wait_for"
instance = "alice"
pattern = "Last scan:"
timeout_ms = 10000

[[steps]]
id = "alice-lan-empty-guard"
action = "send_keys"
instance = "alice"
keys = "p"
timeout_ms = 2000

[[steps]]
id = "alice-lan-empty-toast"
action = "expect_toast"
instance = "alice"
value = "No LAN peers yet. Press d to rescan."
timeout_ms = 8000

[[steps]]
id = "alice-dismiss-empty-toast"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-open-contact-detail-with-enter"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 1000

[[steps]]
id = "alice-contact-detail-visible"
action = "wait_for"
instance = "alice"
pattern = "Details"
timeout_ms = 8000

[[steps]]
id = "alice-return-list-from-detail"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-start-chat-from-contact"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "alice-chat-opened-from-contact"
action = "wait_for"
instance = "alice"
pattern = "Channels"
timeout_ms = 8000

[[steps]]
id = "alice-return-to-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-contact-count-still-one"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "alice-open-remove-contact-modal"
action = "send_keys"
instance = "alice"
keys = "r"
timeout_ms = 2000

[[steps]]
id = "alice-remove-contact-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Remove Contact"
timeout_ms = 8000

[[steps]]
id = "alice-confirm-remove-contact"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-count-zero"
action = "wait_for"
instance = "alice"
pattern = "Contacts (0)"
timeout_ms = 16000
