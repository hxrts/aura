schema_version = 1
id = "moderation-and-modal-coverage"
goal = "Cover moderator success paths and neighborhood modal submit flows for terminology changes."
execution_mode = "scripted"
required_capabilities = ["local"]

# User flow reference (from work/runtime_harness_gap_coverage_flow.md):
# 1) Launch Alice/Bob/Carol and create accounts.
# 2) Establish Alice<->Bob contact via invitation exchange.
# 3) In chat, Alice and Bob join channel; Alice invites Bob as needed.
# 4) Alice runs /op <alice_id> and verifies moderator-granted result.
# 5) Alice runs /kick <bob_id> and verifies moderation success.
# 6) Re-invite and rejoin Bob to preserve neighborhood contact coverage.
# 7) Alice enters Neighborhood home detail view at Full depth.
# 8) Open Access Override modal, toggle level, submit, verify preview toast.
# 9) Open Capability Config modal, set Full/Partial/Limited fields, submit,
#    and verify saved toast.
# 10) Open Assign Moderator modal, submit on Bob target, verify policy denial
#     for non-member designation.

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "carol-ready"
action = "wait_for"
instance = "carol"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "carol-create-account"
action = "send_keys"
instance = "carol"
keys = "Carol\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Can enter:"
timeout_ms = 30000

[[steps]]
id = "alice-open-home-create"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-home-create-modal"
action = "wait_for"
instance = "alice"
pattern = "Create New Home"
timeout_ms = 12000

[[steps]]
id = "alice-home-create-name"
action = "send_keys"
instance = "alice"
keys = "GapHome"
timeout_ms = 2000

[[steps]]
id = "alice-home-create-submit"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-home-created"
action = "expect_toast"
instance = "alice"
contains = "Home 'GapHome' created"
timeout_ms = 12000

[[steps]]
id = "alice-id"
action = "get_authority_id"
instance = "alice"
var = "alice_id"
timeout_ms = 4000

[[steps]]
id = "bob-id"
action = "get_authority_id"
instance = "bob"
var = "bob_id"
timeout_ms = 4000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-visible"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 12000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-linked"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "alice-open-chat"
action = "send_keys"
instance = "alice"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "bob-open-chat"
action = "send_keys"
instance = "bob"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "alice-join-gap-lab"
action = "send_chat_command"
instance = "alice"
command = "join gap-lab"
timeout_ms = 2000

[[steps]]
id = "alice-join-gap-lab-result"
action = "expect_command_result"
instance = "alice"
contains = "membership updated"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-invite-bob-gap-lab"
action = "send_chat_command"
instance = "alice"
command = "invite ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-invite-bob-gap-lab-result"
action = "expect_command_result"
instance = "alice"
contains = "invitation sent"
consistency = "enforced"
timeout_ms = 12000

[[steps]]
id = "bob-join-gap-lab"
action = "send_chat_command"
instance = "bob"
command = "join gap-lab"
timeout_ms = 2000

[[steps]]
id = "bob-join-gap-lab-result"
action = "expect_command_result"
instance = "bob"
contains = "membership updated"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-op-self"
action = "send_chat_command"
instance = "alice"
command = "op ${alice_id}"
timeout_ms = 2000

[[steps]]
id = "alice-op-self-result"
action = "expect_command_result"
instance = "alice"
contains = "moderator granted"
consistency = "enforced"
timeout_ms = 12000

[[steps]]
id = "alice-kick-bob"
action = "send_chat_command"
instance = "alice"
command = "kick ${bob_id} gap-flow-kick"
timeout_ms = 2000

[[steps]]
id = "alice-kick-bob-result"
action = "expect_toast"
instance = "alice"
contains = "kick"
timeout_ms = 12000

[[steps]]
id = "alice-reinvite-bob"
action = "send_chat_command"
instance = "alice"
command = "invite ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-reinvite-bob-result"
action = "expect_command_result"
instance = "alice"
contains = "invitation sent"
consistency = "enforced"
timeout_ms = 12000

[[steps]]
id = "bob-rejoin-gap-lab"
action = "send_chat_command"
instance = "bob"
command = "join gap-lab"
timeout_ms = 2000

[[steps]]
id = "bob-rejoin-gap-lab-result"
action = "expect_command_result"
instance = "bob"
contains = "membership updated"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-open-neighborhood"
action = "send_keys"
instance = "alice"
keys = "1"
timeout_ms = 2000

[[steps]]
id = "alice-enter-full-depth"
action = "send_keys"
instance = "alice"
keys = "dd"
timeout_ms = 2000

[[steps]]
id = "alice-enter-home-detail"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-home-detail-visible"
action = "wait_for"
instance = "alice"
pattern = "Access:"
timeout_ms = 12000

[[steps]]
id = "alice-drain-transient-toasts"
action = "fault_delay"
timeout_ms = 7000

[[steps]]
id = "alice-open-access-override-modal"
action = "send_keys"
instance = "alice"
keys = "x"
timeout_ms = 2000

[[steps]]
id = "alice-access-override-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Access Override"
timeout_ms = 12000

[[steps]]
id = "alice-toggle-access-override"
action = "send_key"
instance = "alice"
key = "tab"
timeout_ms = 2000

[[steps]]
id = "alice-submit-access-override"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-access-override-preview"
action = "expect_toast"
instance = "alice"
contains = "Access override preview"
timeout_ms = 12000

[[steps]]
id = "alice-clear-access-override-toast"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-open-capability-config-modal"
action = "send_keys"
instance = "alice"
keys = "p"
timeout_ms = 2000

[[steps]]
id = "alice-capability-config-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Home Capability Configuration"
timeout_ms = 12000

[[steps]]
id = "alice-cap-config-full"
action = "send_keys"
instance = "alice"
keys = "send,invite,pin"
timeout_ms = 2000

[[steps]]
id = "alice-cap-config-tab-partial"
action = "send_key"
instance = "alice"
key = "tab"
timeout_ms = 2000

[[steps]]
id = "alice-cap-config-partial"
action = "send_keys"
instance = "alice"
keys = "send,read"
timeout_ms = 2000

[[steps]]
id = "alice-cap-config-tab-limited"
action = "send_key"
instance = "alice"
key = "tab"
timeout_ms = 2000

[[steps]]
id = "alice-cap-config-limited"
action = "send_keys"
instance = "alice"
keys = "read"
timeout_ms = 2000

[[steps]]
id = "alice-cap-config-submit"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-cap-config-saved"
action = "expect_toast"
instance = "alice"
contains = "Capability config saved"
timeout_ms = 12000

[[steps]]
id = "alice-clear-cap-config-toast"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 1000

[[steps]]
id = "alice-open-moderator-modal"
action = "send_keys"
instance = "alice"
keys = "o"
timeout_ms = 2000

[[steps]]
id = "alice-moderator-modal-visible"
action = "wait_for"
instance = "alice"
pattern = "Assign Moderator"
timeout_ms = 12000

[[steps]]
id = "alice-submit-moderator-modal"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-moderator-assignment-denied"
action = "expect_toast"
instance = "alice"
contains = "Cannot designate non-member"
timeout_ms = 12000
