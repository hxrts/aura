schema_version = 1
id = "scenario1-invitation-chat-e2e"
goal = "Complete work/scenario.md invitation, shared channel, and bidirectional chat flow."
execution_mode = "scripted"
required_capabilities = ["local"]

# User flow reference (from work/scenario.md):
# Phase 1 - Out-of-band invitation:
# 1) Alice opens Contacts, creates invitation, copies code.
# 2) Bob opens Contacts, imports invitation code, submits.
# 3) Both sides confirm connected contact state.
# Phase 2 - Chat channel setup:
# 1) Alice opens Chat and creates channel with Bob selected.
# 2) Bob opens Chat and selects the same channel.
# Phase 3 - Bidirectional messaging:
# 1) Alice sends deterministic token messages.
# 2) Bob sends deterministic token messages.
# 3) Verify both directions deliver in order.
# Success criteria: invitation accepted, shared channel visible on both sides,
# and deterministic bidirectional messages are delivered.

[[steps]]
id = "launch"
action = "launch_instances"
timeout_ms = 15000

[[steps]]
id = "alice-ready"
action = "wait_for"
instance = "alice"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "bob-ready"
action = "wait_for"
instance = "bob"
pattern = "Welcome to Aura"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "send_keys"
instance = "alice"
keys = "Alice\n"
timeout_ms = 3000

[[steps]]
id = "bob-create-account"
action = "send_keys"
instance = "bob"
keys = "Bob\n"
timeout_ms = 3000

[[steps]]
id = "alice-map-ready"
action = "wait_for"
instance = "alice"
pattern = "Map → Street"
timeout_ms = 30000

[[steps]]
id = "bob-map-ready"
action = "wait_for"
instance = "bob"
pattern = "Map → Street"
timeout_ms = 30000

[[steps]]
id = "alice-open-contacts"
action = "send_keys"
instance = "alice"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "bob-open-contacts"
action = "send_keys"
instance = "bob"
keys = "3"
timeout_ms = 2000

[[steps]]
id = "alice-open-invite-modal"
action = "send_keys"
instance = "alice"
keys = "n"
timeout_ms = 2000

[[steps]]
id = "alice-create-invitation"
action = "send_key"
instance = "alice"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-invitation-created-visible"
action = "wait_for"
instance = "alice"
pattern = "Invitation Created"
timeout_ms = 10000

[[steps]]
id = "alice-copy-invitation"
action = "send_keys"
instance = "alice"
keys = "c"
timeout_ms = 2000

[[steps]]
id = "alice-copy-propagated"
action = "fault_delay"
timeout_ms = 1000

[[steps]]
id = "alice-close-invitation"
action = "send_key"
instance = "alice"
key = "esc"
timeout_ms = 2000

[[steps]]
id = "bob-open-accept-modal"
action = "send_keys"
instance = "bob"
keys = "a"
timeout_ms = 2000

[[steps]]
id = "bob-import-invitation"
action = "send_clipboard"
instance = "bob"
source_instance = "alice"
timeout_ms = 12000

[[steps]]
id = "bob-submit-invitation"
action = "send_key"
instance = "bob"
key = "enter"
timeout_ms = 2000

[[steps]]
id = "alice-contact-linked"
action = "wait_for"
instance = "alice"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "bob-contact-linked"
action = "wait_for"
instance = "bob"
pattern = "Contacts (1)"
timeout_ms = 12000

[[steps]]
id = "bob-authority-id"
action = "get_authority_id"
instance = "bob"
var = "bob_id"
timeout_ms = 4000

[[steps]]
id = "alice-open-chat"
action = "send_keys"
instance = "alice"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "bob-open-chat"
action = "send_keys"
instance = "bob"
keys = "2"
timeout_ms = 2000

[[steps]]
id = "alice-chat-context-ready"
action = "wait_for"
instance = "alice"
pattern = "Channels"
timeout_ms = 5000

[[steps]]
id = "bob-chat-context-ready"
action = "wait_for"
instance = "bob"
pattern = "Channels"
timeout_ms = 5000

[[steps]]
id = "alice-join"
action = "send_chat_command"
instance = "alice"
command = "join slash-lab"
timeout_ms = 2000

[[steps]]
id = "alice-join-result"
action = "expect_command_result"
instance = "alice"
contains = "membership updated"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-invite-bob"
action = "send_chat_command"
instance = "alice"
command = "invite ${bob_id}"
timeout_ms = 2000

[[steps]]
id = "alice-invite-result"
action = "expect_command_result"
instance = "alice"
contains = "invitation sent"
consistency = "enforced"
timeout_ms = 12000

[[steps]]
id = "bob-join"
action = "send_chat_command"
instance = "bob"
command = "join slash-lab"
timeout_ms = 2000

[[steps]]
id = "bob-join-result"
action = "expect_command_result"
instance = "bob"
contains = "membership updated"
consistency = "replicated"
timeout_ms = 12000

[[steps]]
id = "alice-select-channel"
action = "select_channel"
instance = "alice"
channel = "slash-lab"
timeout_ms = 6000

[[steps]]
id = "bob-select-channel"
action = "select_channel"
instance = "bob"
channel = "slash-lab"
timeout_ms = 6000

[[steps]]
id = "alice-send-msg-a-1"
action = "send_keys"
instance = "alice"
keys = "\u001bimsg-a-1\n"
timeout_ms = 2000

[[steps]]
id = "bob-see-msg-a-1"
action = "wait_for"
instance = "bob"
pattern = "msg-a-1"
timeout_ms = 12000

[[steps]]
id = "bob-send-msg-b-1"
action = "send_keys"
instance = "bob"
keys = "\u001bimsg-b-1\n"
timeout_ms = 2000

[[steps]]
id = "alice-see-msg-b-1"
action = "wait_for"
instance = "alice"
pattern = "msg-b-1"
timeout_ms = 12000

[[steps]]
id = "alice-send-msg-a-2"
action = "send_keys"
instance = "alice"
keys = "\u001bimsg-a-2\n"
timeout_ms = 2000

[[steps]]
id = "bob-see-msg-a-2"
action = "wait_for"
instance = "bob"
pattern = "msg-a-2"
timeout_ms = 12000

[[steps]]
id = "bob-send-msg-b-2"
action = "send_keys"
instance = "bob"
keys = "\u001bimsg-b-2\n"
timeout_ms = 2000

[[steps]]
id = "alice-see-msg-b-2"
action = "wait_for"
instance = "alice"
pattern = "msg-b-2"
timeout_ms = 12000
