# Local discovery smoke test:
#
# 1. Launch two local instances (alice and bob).
# 2. Alice opens discovery view.
# 3. Bob initiates connection.
# 4. Verify connection established between instances.
#
# Success criteria: both instances discover each other and connect.

schema_version = 1
id = "local-discovery-smoke"
goal = "Verify two local instances can discover and connect."
required_capabilities = ["local"]

[[steps]]
id = "launch-all"
action = "launch_instances"
expect = "both instances launched"
timeout_ms = 15000

[[steps]]
id = "alice-open-discovery"
action = "send_keys"
instance = "alice"
expect = "discovery view visible"
timeout_ms = 5000

[[steps]]
id = "bob-connect"
action = "send_keys"
instance = "bob"
expect = "connection established"
timeout_ms = 10000
