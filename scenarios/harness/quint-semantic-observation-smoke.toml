# Quint-originated semantic observation smoke test:
#
# 1. Launch alice actor.
# 2. Wait for onboarding control visibility.
# 3. Fill account name and submit.
# 4. Wait for neighborhood screen and ready state.
# 5. Navigate to settings via semantic nav action.
# 6. Verify settings screen is visible.
#
# Success criteria: Quint-originated scenario executes through
# aura-harness with semantic observation.

id = "quint-semantic-observation-smoke"
goal = "Execute a Quint-originated semantic observation flow through aura-harness."

[[steps]]
id = "launch"
action = "launch_actors"
timeout_ms = 15000

[[steps]]
id = "alice-onboarding-visible"
action = "control_visible"
actor = "alice"
control_id = "onboarding_root"
timeout_ms = 30000

[[steps]]
id = "alice-create-account"
action = "create_account"
actor = "alice"
value = "Alice"
timeout_ms = 4000

[[steps]]
id = "alice-neighborhood-visible"
action = "screen_is"
actor = "alice"
screen_id = "neighborhood"
timeout_ms = 30000

[[steps]]
id = "alice-neighborhood-ready"
action = "readiness_is"
actor = "alice"
readiness = "ready"
timeout_ms = 30000

[[steps]]
id = "alice-open-settings-via-nav"
action = "navigate"
actor = "alice"
screen_id = "settings"
timeout_ms = 3000

[[steps]]
id = "alice-settings-visible"
action = "screen_is"
actor = "alice"
screen_id = "settings"
timeout_ms = 30000
