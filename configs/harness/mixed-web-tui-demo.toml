schema_version = 1

[run]
name = "mixed-web-tui-demo"
pty_rows = 40
pty_cols = 120
artifact_dir = "artifacts/harness/mixed-web-tui-demo"

[[instances]]
id = "alice"
mode = "local"
data_dir = "artifacts/harness/state/mixed-web-tui-demo/alice"
device_id = "alice-demo-01"
bind_address = "127.0.0.1:43001"
demo_mode = true

[instances.lan_discovery]
enabled = true
bind_addr = "127.0.0.1"
broadcast_addr = "127.0.0.1"
port = 19533

[[instances]]
id = "bob"
mode = "browser"
data_dir = ".tmp/harness-browser/mixed-web-tui-demo/bob"
device_id = "bob-browser-01"
bind_address = "127.0.0.1:53001"
demo_mode = false
env = [
  "AURA_HARNESS_BROWSER_HEADLESS=true",
]
