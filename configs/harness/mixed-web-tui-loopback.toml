schema_version = 1

[run]
name = "mixed-web-tui-loopback"
pty_rows = 40
pty_cols = 120
artifact_dir = "artifacts/harness/mixed-web-tui-loopback"

[[instances]]
id = "alice"
mode = "local"
data_dir = "artifacts/harness/state/mixed-web-tui-loopback/alice"
device_id = "alice-local-01"
bind_address = "127.0.0.1:43011"
demo_mode = false

[instances.lan_discovery]
enabled = true
bind_addr = "127.0.0.1"
broadcast_addr = "127.0.0.1"
port = 19543

[[instances]]
id = "bob"
mode = "browser"
data_dir = ".tmp/harness-browser/mixed-web-tui-loopback/bob"
device_id = "bob-browser-11"
bind_address = "127.0.0.1:53011"
demo_mode = false
env = [
  "AURA_HARNESS_BROWSER_HEADLESS=true",
]
